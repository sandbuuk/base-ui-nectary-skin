<style>
:host {
  display: block;
}

#wrapper {
  display: flex;
  position: relative;
  box-sizing: border-box;
  height: 40px;
  padding: 4px 10px 4px 6px;
  align-items: center;
  gap: 6px;
  user-select: none;
  cursor: pointer;
}

#text {
  flex-shrink: 1;
  overflow: hidden;
  white-space: nowrap;
  text-overflow: ellipsis;
}

#icon-container {
  position: relative;
  width: 32px;
  height: 32px;
}

/* Border / Background */
#icon-container::before {
  content: "";
  position: absolute;
  top: 6px;
  left: 6px;
  width: 20px;
  height: 20px;
  border-radius: 50%;
  pointer-events: none;
  background-color: var(--sinch-color-snow-100);
  box-shadow: 0 0 0 2px var(--sinch-color-stormy-300) inset;
  transition: background-color 0.1s linear;
}

#icon-knob {
  position: absolute;
  left: 11px;
  top: 11px;
  width: 10px;
  height: 10px;
  border-radius: 50%;
  transition: opacity 0.1s linear;
  opacity: 0;
  background-color: var(--sinch-color-tropical-500);
  pointer-events: none;
}

:host([checked]:not([checked="false"])) #icon-container::before {
  box-shadow: 0 0 0 2px var(--sinch-color-tropical-500) inset;
}

:host([checked]:not([checked="false"])) #icon-knob {
  opacity: 1;
}

:host(:hover) > #wrapper,
:host([data-selected]) > #wrapper {
  background-color: var(--sinch-color-snow-500);
}

:host([disabled]:not([disabled="false"])) > #wrapper {
  color: var(--sinch-color-stormy-100);
  cursor: initial;
}

:host([disabled]:not([disabled="false"])) #icon-container::before {
  box-shadow: 0 0 0 2px var(--sinch-color-stormy-100) inset;
}

@media (prefers-reduced-motion) {
  #icon-knob,
  #icon-container::before {
    transition: none;
  }
}
</style>

<div id="wrapper">
  <div id="icon-container">
    <div id="icon-knob"></div>
  </div>
  <span id="text"></span>
</div>
