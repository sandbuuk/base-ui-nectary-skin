<style>
:host {
  display: block;
  outline: none;
  min-height: 48px;
}

#wrapper {
  display: flex;
  flex-direction: column;
  position: relative;
  width: 100%;
  height: 100%;
  box-sizing: border-box;
  overflow: hidden;
  border-bottom: 1px solid var(--sinch-comp-accordion-color-default-border-initial);
}

:host(:last-child) > #wrapper {
  border-bottom: none;
}

#button {
  all: initial;
  display: flex;
  position: relative;
  align-items: center;
  gap: 8px;
  box-sizing: border-box;
  width: 100%;
  height: 48px;
  padding: 0 4px 0 8px;
  cursor: pointer;

  --sinch-global-color-icon: var(--sinch-comp-accordion-color-default-icon-initial);
  --sinch-global-size-icon: var(--sinch-comp-accordion-size-icon);
}

#button > * {
  pointer-events: none;
}

#button:disabled {
  cursor: initial;

  --sinch-global-color-icon: var(--sinch-comp-accordion-color-disabled-icon-initial);
}

#button:focus-visible::after {
  content: "";
  position: absolute;
  inset: 0;
  border: 2px solid var(--sinch-comp-accordion-color-default-outline-focus);
  pointer-events: none;
}

#status-wrapper {
  display: none;
  width: 18px;
  height: 24px;
  padding: 8px 8px 8px 2px;
  box-sizing: border-box;
}

#status {
  width: 8px;
  height: 8px;
  border-radius: 50%;
}

:host([status]:not([status=""])) #status-wrapper {
  display: block;
}

:host([status="success"]) #status {
  background-color: var(--sinch-comp-accordion-color-default-status-success);
}

:host([status="warn"]) #status {
  background-color: var(--sinch-comp-accordion-color-default-status-warning);
}

:host([status="error"]) #status {
  background-color: var(--sinch-comp-accordion-color-default-status-error);
}

:host([status="info"]) #status {
  background-color: var(--sinch-comp-accordion-color-default-status-info);
}

#title {
  flex: 1;
  min-width: 0;

  --sinch-comp-title-font: var(--sinch-comp-accordion-font-title);
  --sinch-global-color-text: var(--sinch-comp-accordion-color-default-title-initial);
}

#button:disabled > #title {
  --sinch-global-color-text: var(--sinch-comp-accordion-color-disabled-title-initial);
}

#content {
  display: none;
  overflow-y: auto;
  flex-shrink: 1;
  min-height: 0;
  padding: 0 8px 18px;
}

#dropdown-icon {
  transform: rotate(0deg);
  will-change: transform;
  transition: transform 0.25s ease-in-out;
}

#button[aria-expanded="true"] > #dropdown-icon {
  transform: rotate(180deg);
}

#button[aria-expanded="true"] + #content {
  display: block;
}

#optional {
  --sinch-comp-text-font: var(--sinch-comp-accordion-font-optional-text);
  --sinch-global-color-text: var(--sinch-comp-accordion-color-default-optional-text-initial);
}

#button:disabled > #optional {
  --sinch-global-color-text: var(--sinch-comp-accordion-color-disabled-optional-text-initial);
}
</style>

<div id="wrapper">
  <button id="button" aria-controls="content" aria-expanded="false">
    <div id="status-wrapper">
      <div id="status"></div>
    </div>
    <slot name="icon"></slot>
    <sinch-title id="title" level="3" type="m" ellipsis></sinch-title>
    <sinch-text id="optional" type="m"></sinch-text>
    <sinch-icon id="dropdown-icon" name="keyboard_arrow_down"></sinch-icon>
  </button>
  <div id="content" role="region" aria-labelledby="button">
    <slot name="content"></slot>
  </div>
</div>
