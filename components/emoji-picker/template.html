<style>
  :host {
    display: block;
  }

  #wrapper {
    width: 384px;
    max-height: 504px;
    display: flex;
    flex-direction: column;
    gap: 8px;
    padding: 12px 0;
  }

  #toolbar {
    display: flex;
    gap: 8px;
    padding: 0 12px;
  }

  #search {
    flex: 1;
    min-width: 0;
  }

  #search-clear:not(.active) {
    display: none;
  }

  #list-wrapper {
    overflow-y: auto;
    overflow-x: hidden;
    width: 384px;
    box-sizing: border-box;
    scrollbar-gutter: stable;
  }

  #list {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    padding: 4px 12px 0;
    width: 384px;
    box-sizing: border-box;
  }

  #not-found {
    display: none;
    width: 100%;
    height: 48px;
    align-items: center;
    justify-content: center;
    pointer-events: none;
    user-select: none;

    --sinch-global-color-text:
      var(
        --sinch-comp-emoji-picker-color-default-text-not-found
      );
    --sinch-comp-text-font: var(--sinch-comp-emoji-picker-font-not-found);
  }

  #not-found.active {
    display: flex;
  }

  sinch-tabs-icon-option > svg {
    pointer-events: none;

    /* Variables Defined in parent sinch-tabs-icon-option */
    /* stylelint-disable-next-line csstools/value-no-unknown-custom-properties */
    height: var(--sinch-global-size-icon);
    /* stylelint-disable-next-line csstools/value-no-unknown-custom-properties */
    fill: var(--sinch-global-color-icon);
  }
</style>

<div id="wrapper">
  <div id="toolbar">
    <sinch-input id="search" size="l" aria-label="Search emojis">
      <sinch-icon-magnifying-glass
        id="icon-search"
        slot="icon"
      ></sinch-icon-magnifying-glass>
      <sinch-button id="search-clear" slot="right" aria-label="Clear">
        <sinch-icon-fa-xmark slot="icon"></sinch-icon-fa-xmark>
      </sinch-button>
    </sinch-input>
    <sinch-popover
      id="skin-popover"
      orientation="bottom-left"
      aria-label="Emoji skin tone select"
    >
      <sinch-button
        id="skin-button"
        slot="target"
        size="l"
        aria-label="Select emoji skin tones"
      >
        <sinch-color-swatch
          id="skin-swatch"
          slot="icon"
          name="skintone-default"
        ></sinch-color-swatch>
      </sinch-button>
      <sinch-color-menu
        id="skin-menu"
        slot="content"
        cols="1"
        value="skintone-default"
        aria-label="Emoji skin tone menu"
      >
        <sinch-color-menu-option
          value="skintone-default"
        ></sinch-color-menu-option>
        <sinch-color-menu-option
          value="skintone-light"
        ></sinch-color-menu-option>
        <sinch-color-menu-option
          value="skintone-light-medium"
        ></sinch-color-menu-option>
        <sinch-color-menu-option
          value="skintone-medium"
        ></sinch-color-menu-option>
        <sinch-color-menu-option
          value="skintone-medium-dark"
        ></sinch-color-menu-option>
        <sinch-color-menu-option
          value="skintone-dark"
        ></sinch-color-menu-option>
      </sinch-color-menu>
    </sinch-popover>
  </div>
