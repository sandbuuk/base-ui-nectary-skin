<style>
/* stylelint-disable no-descending-specificity */
:host {
  display: inline-block;
  vertical-align: middle;
  outline: none;
}

button {
  all: initial;
  position: relative;
  display: flex;
  align-items: center;
  justify-content: center;
  width: 48px;
  height: 48px;
  cursor: pointer;
  contain: size;

  --sinch-size-icon: 24px;
  --sinch-color-icon: var(--sinch-icon-button-color, var(--sinch-color-stormy-500));
  --sinch-icon-button-shape-radius: var(--sinch-shape-radius-l);
}

button::before {
  content: "";
  position: absolute;
  left: 0;
  top: 0;
  width: 100%;
  height: 100%;
  border-radius: var(--sinch-icon-button-shape-radius);
  pointer-events: none;
  box-sizing: border-box;
  border: 1px solid transparent;
  background-color: transparent;
  mix-blend-mode: multiply;
}

button:focus-visible::after {
  position: absolute;
  content: "";
  left: 50%;
  top: 50%;
  transform: translate(-50%, -50%);
  width: 100%;
  height: 100%;
  padding: 2px;
  border: 2px solid var(--sinch-color-aqua-400);
  border-radius: calc(var(--sinch-icon-button-shape-radius) + 4px);
  pointer-events: none;
}

@supports not selector(:focus-visible) {
  button:focus::after {
    position: absolute;
    content: "";
    left: 50%;
    top: 50%;
    transform: translate(-50%, -50%);
    width: 100%;
    height: 100%;
    padding: 2px;
    border: 2px solid var(--sinch-color-aqua-400);
    border-radius: calc(var(--sinch-icon-button-shape-radius) + 4px);
    pointer-events: none;
  }
}

button:enabled:hover::before {
  background-color: #F1F2F4;
}

button:enabled:active::before {
  background-color: #E3E6E8;
}

button:disabled {
  background-color: transparent;
  cursor: initial;

  --sinch-color-spinner-bg: var(--sinch-color-snow-200);
  --sinch-color-spinner-fg: var(--sinch-color-stormy-200);
  --sinch-color-icon: var(--sinch-color-stormy-100);
}

:host([small]:not([small="false"])) #button {
  width: 32px;
  height: 32px;

  --sinch-icon-button-shape-radius: var(--sinch-shape-radius-m);
}

button > * {
  pointer-events: none;
}
</style>

<sinch-tooltip id="tooltip">
  <button id="button">
    <slot name="icon"></slot>
  </button>
</sinch-tooltip>
