<style>
:host {
  display: block;
}

#wrapper {
  display: flex;
  flex-direction: row;
  align-items: flex-start;
  padding: 16px;
  border-radius: var(--sinch-shape-radius-l);
  box-sizing: border-box;
  width: 100%;
}

#body-wrapper {
  display: flex;
  flex-direction: column;
  align-items: flex-start;
  margin-left: 8px;
  min-width: 0;
  flex: 1;
}

#caption {
  color: var(--sinch-color-stormy-500);
  align-self: stretch;
}

#text {
  color: var(--sinch-color-stormy-500);
  margin-top: 4px;
  align-self: stretch;
}

#text:empty {
  display: none;
}

#icon-info,
#icon-success,
#icon-warn,
#icon-error {
  display: none;
}

:host([type="success"]) #wrapper {
  background-color: var(--sinch-color-feedback-success-bg);
}

:host([type="warn"]) #wrapper {
  background-color: var(--sinch-color-feedback-warning-bg);
}

:host([type="error"]) #wrapper {
  background-color: var(--sinch-color-feedback-invalid-bg);
}

:host([type="info"]) #wrapper {
  background-color: var(--sinch-color-feedback-info-bg);
}

:host([type="success"]) #icon-success {
  display: block;

  --sinch-color-icon: var(--sinch-color-feedback-success-icon);
}

:host([type="warn"]) #icon-warn {
  display: block;

  --sinch-color-icon: var(--sinch-color-feedback-warning-icon);
}

:host([type="error"]) #icon-error {
  display: block;

  --sinch-color-icon: var(--sinch-color-feedback-invalid-icon);
}

:host([type="info"]) #icon-info {
  display: block;

  --sinch-color-icon: var(--sinch-color-feedback-info-icon);
}

#action {
  display: flex;
  margin-top: 16px;
  min-width: 0;
}

#action.empty {
  display: none;
}

#close {
  margin-left: 16px;
}

#close.empty {
  display: none;
}
</style>

<div id="wrapper">
  <sinch-icon-info id="icon-info"></sinch-icon-info>
  <sinch-icon-check-circle id="icon-success"></sinch-icon-check-circle>
  <sinch-icon-report-problem id="icon-warn"></sinch-icon-report-problem>
  <sinch-icon-report id="icon-error"></sinch-icon-report>
  <div id="body-wrapper">
    <sinch-title id="caption" level="3" type="s" ellipsis></sinch-title>
    <sinch-text id="text" type="m"></sinch-text>
    <div id="action">
      <slot name="action"></slot>
    </div>
  </div>
  <div id="close">
    <slot name="close"></slot>
  </div>
</div>
