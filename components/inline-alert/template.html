<style>
  :host {
    display: block;
  }

  #wrapper {
    display: flex;
    flex-direction: row;
    align-items: flex-start;
    padding: 16px;
    border-radius: var(--sinch-comp-inline-alert-shape-radius);
    box-sizing: border-box;
    width: 100%;
  }

  :host([type="success"]) #wrapper {
    background-color:
      var(
        --sinch-comp-inline-alert-color-success-default-background
      );
  }

  :host([type="warn"]) #wrapper {
    background-color:
      var(
        --sinch-comp-inline-alert-color-warning-default-background
      );
  }

  :host([type="error"]) #wrapper {
    background-color:
      var(
        --sinch-comp-inline-alert-color-error-default-background
      );
  }

  :host([type="info"]) #wrapper {
    background-color:
      var(
        --sinch-comp-inline-alert-color-info-default-background
      );
  }

  :host([type="success"]) #icon {
    --sinch-global-color-icon:
      var(
        --sinch-comp-inline-alert-color-success-default-icon
      );
  }

  :host([type="warn"]) #icon {
    --sinch-global-color-icon:
      var(
        --sinch-comp-inline-alert-color-warning-default-icon
      );
  }

  :host([type="error"]) #icon {
    --sinch-global-color-icon:
      var(
        --sinch-comp-inline-alert-color-error-default-icon
      );
  }

  :host([type="info"]) #icon {
    --sinch-global-color-icon:
      var(
        --sinch-comp-inline-alert-color-info-default-icon
      );
  }

  #body-wrapper {
    display: flex;
    flex-direction: column;
    align-items: flex-start;
    margin-left: 8px;
    min-width: 0;
    flex: 1;
  }

  #caption {
    align-self: stretch;

    --sinch-comp-title-font: var(--sinch-comp-inline-alert-font-title);
  }

  :host([type="success"]) #caption {
    --sinch-global-color-text:
      var(
        --sinch-comp-inline-alert-color-success-default-text
      );
  }

  :host([type="warn"]) #caption {
    --sinch-global-color-text:
      var(
        --sinch-comp-inline-alert-color-warning-default-text
      );
  }

  :host([type="error"]) #caption {
    --sinch-global-color-text:
      var(
        --sinch-comp-inline-alert-color-error-default-text
      );
  }

  :host([type="info"]) #caption {
    --sinch-global-color-text:
      var(
        --sinch-comp-inline-alert-color-info-default-text
      );
  }

  #text {
    display: flex;
    flex-direction: column;
    gap: 8px;
    margin-top: 0;
    align-self: stretch;

    --sinch-comp-rich-text-font: var(--sinch-comp-inline-alert-font-body);
  }

  :host([type="success"]) #text {
    --sinch-global-color-text:
      var(
        --sinch-comp-inline-alert-color-success-default-text
      );
  }

  :host([type="warn"]) #text {
    --sinch-global-color-text:
      var(
        --sinch-comp-inline-alert-color-warning-default-text
      );
  }

  :host([type="error"]) #text {
    --sinch-global-color-text:
      var(
        --sinch-comp-inline-alert-color-error-default-text
      );
  }

  :host([type="info"]) #text {
    --sinch-global-color-text:
      var(
        --sinch-comp-inline-alert-color-info-default-text
      );
  }

  :host([caption]) #text,
  :host([caption=""]) #text {
    margin-top: 4px;
  }

  #action {
    width: 100%;
    display: flex;
    margin-top: 16px;
    min-width: 0;
    gap: 16px;
  }

  #action.empty {
    display: none;
  }

  #close {
    margin-left: 16px;
  }

  #close.empty {
    display: none;
  }
</style>

<div id="wrapper">
  <sinch-icon icons-version="2" name="" id="icon"></sinch-icon>
  <div id="body-wrapper">
    <sinch-title id="caption" level="3" type="s"></sinch-title>
    <sinch-rich-text id="text"></sinch-rich-text>
    <div id="action">
      <slot name="action"></slot>
    </div>
  </div>
  <div id="close">
    <slot name="close"></slot>
  </div>
</div>
