<style>
:host {
  display: block;
  outline: none;
}

#wrapper {
  width: 44px;
  height: 56px;
  padding: 12px 6px;
  box-sizing: border-box;
}

#swatch-wrapper {
  position: relative;
  cursor: pointer;
  width: 32px;
  height: 32px;
}

#swatch-wrapper::after {
  content: "";
  position: absolute;
  width: 34px;
  height: 34px;
  inset: -3px;
  border: 2px solid var(--sinch-comp-color-menu-option-color-default-border-initial);
  border-radius: 50%;
  pointer-events: none;
}

:host([data-checked]) #swatch-wrapper::after {
  border-color: var(--sinch-comp-color-menu-option-color-default-border-selected);
}

:host([data-selected]) #swatch-wrapper::after {
  border-color: var(--sinch-comp-color-menu-option-color-default-border-focus);
}

:host(:hover) #swatch-wrapper::after {
  border-color: var(--sinch-comp-color-menu-option-color-default-border-hover);
}

:host(:active) #swatch-wrapper::after {
  border-color: var(--sinch-comp-color-menu-option-color-default-border-active);
}
</style>

<div id="wrapper">
  <sinch-tooltip id="tooltip">
    <div id="swatch-wrapper">
      <sinch-color-swatch id="swatch"></sinch-color-swatch>
    </div>
  </sinch-tooltip>
</div>
