<style>
:host {
  display: block;
}

#wrapper {
  display: flex;
  position: relative;
  box-sizing: border-box;
  height: 40px;
  padding: 8px 16px;
  align-items: center;
  gap: 10px;
  user-select: none;
  cursor: pointer;

  --sinch-size-icon: 24px;
}

#content {
  flex: 1;
  overflow: hidden;
  white-space: nowrap;
  text-overflow: ellipsis;
}

:host(:hover) > #wrapper,
:host([data-selected]) > #wrapper {
  background-color: var(--sinch-color-snow-500);
}

#check {
  display: none;
  margin-right: -6px;
}

:host([data-checked]) #check {
  display: block;
}

:host([disabled]:not([disabled="false"])) > #wrapper {
  color: var(--sinch-color-stormy-100);
  cursor: initial;

  --sinch-color-icon: var(--sinch-color-stormy-100);
}

::slotted(*) {
  margin-left: -6px;
}
</style>

<div id="wrapper">
  <slot name="icon"></slot>
  <span id="content"></span>
  <sinch-icon-check id="check"></sinch-icon-check>
</div>
