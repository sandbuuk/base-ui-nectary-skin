<style>
  :host {
    display: block;
    outline: none;
  }

  #listbox {
    overflow-y: auto;
    max-height: var(--sinch-comp-select-menu-font-max-height);
  }

  #search {
    display: none;
    margin: 10px;
  }

  #search.active {
    display: block;
  }

  #search-clear:not(.active) {
    display: none;
  }

  #not-found {
    display: flex;
    align-items: center;
    justify-content: center;
    width: 100%;
    height: 30px;
    margin-bottom: 10px;
    pointer-events: none;
    user-select: none;

    --sinch-comp-text-font: var(--sinch-comp-select-menu-font-not-found-text);
    --sinch-global-color-text:
      var(
        --sinch-comp-select-menu-color-default-not-found-text-initial
      );
  }

  #not-found:not(.active) {
    display: none;
  }

  ::slotted(.hidden) {
    display: none;
  }

  ::slotted(sinch-title) {
    padding: 8px 16px;

    --sinch-global-color-text: var(--sinch-comp-select-menu-color-default-title-initial);
  }
</style>

<sinch-input id="search" size="s" placeholder="Search">
  <sinch-icon icons-version="2" name="magnifying-glass"
    id="icon-search"
    slot="icon"
  ></sinch-icon>
  <sinch-button id="search-clear" slot="right">
    <sinch-icon icons-version="2" name="fa-xmark" slot="icon"></sinch-icon>
  </sinch-button>
</sinch-input>
<div id="not-found">
  <sinch-text type="m">No results</sinch-text>
</div>
<div id="listbox" role="presentation">
  <slot></slot>
</div>
