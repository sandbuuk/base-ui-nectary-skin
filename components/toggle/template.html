<style>
:host {
  display: inline-block;
  vertical-align: middle;
}

#wrapper {
  position: relative;
  display: flex;
  flex-direction: row;
  align-items: center;
  box-sizing: border-box;
  width: 100%;
  height: var(--sinch-local-size);

  --sinch-local-size: 24px;
}

:host([small]) #wrapper {
  --sinch-local-size: 22px;
}

#input {
  all: initial;
  display: block;
  position: absolute;
  left: 0;
  top: 2px;
  width: 40px;
  height: 20px;
  cursor: pointer;
  pointer-events: initial;
}

#input:disabled {
  cursor: initial;
}

/* Focus Outline */
#input:focus-visible::after {
  position: absolute;
  content: "";
  left: -4px;
  top: -4px;
  right: -4px;
  bottom: -4px;
  border: 2px solid var(--sinch-comp-toggle-color-default-outline-focus);
  border-radius: 18px;
  pointer-events: none;
}

:host([small]) #input {
  width: 32px;
  height: 16px;
  top: 3px;
}

#knob-container {
  position: relative;
  box-sizing: border-box;
  width: 40px;
  height: 20px;
  border-radius: 10px;
  pointer-events: none;
  padding: 2px;
  background-color: var(--sinch-comp-toggle-color-default-background-initial);
  overflow: hidden;
}

:host([small]) #knob-container {
  width: 32px;
  height: 16px;
  border-radius: 8px;
}

#input:checked ~ #knob-container {
  background-color: var(--sinch-comp-toggle-color-checked-background-initial);
}

#input:disabled ~ #knob-container {
  background-color: var(--sinch-comp-toggle-color-disabled-background-initial);
}

#input:checked:disabled ~ #knob-container {
  background-color: var(--sinch-comp-toggle-color-checked-disabled-background-initial);
}

#knob {
  position: relative;
  box-sizing: border-box;
  width: 16px;
  height: 16px;
  border-radius: 50%;
  background-color: var(--sinch-comp-toggle-color-default-knob-background-initial);
  box-shadow: var(--sinch-comp-toggle-shadow-knob-default);
  transform: translateX(0);
  transition: transform 0.1s ease-in-out;
  will-change: transform;
}

:host([small]) #knob {
  width: 12px;
  height: 12px;
}

#input:disabled + #knob-container > #knob {
  box-shadow: var(--sinch-comp-toggle-shadow-knob-disabled);
}

#input:checked + #knob-container > #knob {
  transform: translateX(20px);
}

:host([small]) #input:checked + #knob-container > #knob {
  transform: translateX(16px);
}

/* Knob on-off labels */
#knob::before,
#knob::after {
  font: var(--sinch-comp-toggle-font-size-m-inside-text);
  color: var(--sinch-comp-toggle-color-default-text-inside-initial);
  text-transform: uppercase;
  font-size: 8px;
  line-height: 16px;
  display: none;
  position: absolute;
  top: 0;
  padding: 0 3px;
}

#knob::before {
  content: "on";
  right: 100%;
}

#knob::after {
  content: "off";
  left: 100%;
}

:host([labeled]:not([small])) #knob::before,
:host([labeled]:not([small])) #knob::after {
  display: block;
}

@media (prefers-reduced-motion) {
  #knob {
    transition: none;
  }
}

#label {
  flex: 1;
  align-self: center;
  overflow: hidden;
  white-space: nowrap;
  text-overflow: ellipsis;
  padding-left: 8px;
  font: var(--sinch-comp-toggle-font-size-m-label);
  color: var(--sinch-comp-toggle-color-default-label-initial);
}

#label:empty {
  display: none;
}

:host([small]) #label {
  font: var(--sinch-comp-toggle-font-size-s-label);
}

#input:disabled ~ #label {
  color: var(--sinch-comp-toggle-color-disabled-label-initial);
}
</style>

<div id="wrapper">
  <input id="input" type="checkbox">
  <div id="knob-container">
    <div id="knob"></div>
  </div>
  <label id="label" for="input"></label>
</div>
