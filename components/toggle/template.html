<style>
:host {
  display: inline-block;
  vertical-align: middle;
}

#wrapper {
  position: relative;
  display: flex;
  flex-direction: row;
  align-items: center;
  box-sizing: border-box;
  width: 100%;
  height: 32px;
}

:host([small]:not([small="false"])) #wrapper {
  font: var(--sinch-font-small-text);
}

#input {
  all: initial;
  display: block;
  position: absolute;
  left: 0;
  top: 6px;
  width: 40px;
  height: 20px;
  cursor: pointer;
  pointer-events: initial;
}

#input:disabled {
  cursor: initial;
}

:host([small]:not([small="false"])) #input {
  width: 32px;
  height: 16px;
  top: 8px;
}

#input:focus-visible::after {
  position: absolute;
  content: "";
  left: -4px;
  top: -4px;
  right: -4px;
  bottom: -4px;
  border: 2px solid var(--sinch-color-border-focus);
  border-radius: 18px;
  pointer-events: none;
}

:host([small]:not([small="false"])) #input:focus-visible::after {
  border-radius: 14px;
}

@supports not selector(:focus-visible) {
  #input:focus::after {
    position: absolute;
    content: "";
    left: -4px;
    top: -4px;
    right: -4px;
    bottom: -4px;
    border: 2px solid var(--sinch-color-border-focus);
    border-radius: 18px;
    pointer-events: none;
  }

  :host([small]:not([small="false"])) #input:focus::after {
    border-radius: 14px;
  }
}

#knob-container {
  position: relative;
  box-sizing: border-box;
  width: 40px;
  height: 20px;
  border-radius: 10px;
  pointer-events: none;
  padding: 2px;
  background-color: var(--sinch-color-stormy-100);
  overflow: hidden;
}

:host([small]:not([small="false"])) #knob-container {
  width: 32px;
  height: 16px;
  border-radius: 8px;
}

#input:checked ~ #knob-container {
  background-color: var(--sinch-color-tropical-500);
}

#knob {
  position: relative;
  box-sizing: border-box;
  width: 16px;
  height: 16px;
  border-radius: 50%;
  background-color: var(--sinch-color-snow-100);
  box-shadow: var(--sinch-elevation-level-1);
  transform: translateX(0);
  transition: transform 0.1s ease-in-out;
}

:host([small]:not([small="false"])) #knob {
  width: 12px;
  height: 12px;
}

#input:checked ~ #knob-container > #knob {
  transform: translateX(20px);
}

:host([small]:not([small="false"])) #input:checked ~ #knob-container > #knob {
  transform: translateX(16px);
}

/* Knob on-off labels */
#knob::before,
#knob::after {
  font: var(--sinch-font-body);
  color: var(--sinch-color-snow-100);
  text-transform: uppercase;
  font-size: 8px;
  line-height: 16px;
  display: none;
  position: absolute;
  top: 0;
  padding: 0 3px;
}

#knob::before {
  content: "on";
  right: 100%;
}

#knob::after {
  content: "off";
  left: 100%;
}

:host([labeled]:not([labeled="false"]):is(:not([small]), [small="false"])) #knob::before,
:host([labeled]:not([labeled="false"]):is(:not([small]), [small="false"])) #knob::after {
  display: block;
}

@media (prefers-reduced-motion) {
  #knob {
    transition: none;
  }
}

#label {
  flex: 1;
  align-self: center;
  overflow: hidden;
  white-space: nowrap;
  text-overflow: ellipsis;
  padding-left: 8px;
  font: var(--sinch-font-body);
  color: var(--sinch-color-text-default);
}

#label:empty {
  display: none;
}

#input:disabled ~ #label {
  color: var(--sinch-color-stormy-200);
}

#input:disabled ~ #knob-container {
  background-color: var(--sinch-color-snow-700);
}

#input:checked:disabled ~ #knob-container {
  background-color: var(--sinch-color-tropical-100);
}
</style>

<div id="wrapper">
  <input id="input" type="checkbox">
  <div id="knob-container">
    <div id="knob"></div>
  </div>
  <label id="label" for="input"></label>
</div>
