<style>
  :host {
    display: contents;

    --sinch-sheet-close-button-display: unset;
  }

  #dialog {
    position: fixed;
    margin: 0;
    display: grid;
    grid-template-rows: auto 1fr auto;
    flex-direction: column;
    padding: var(--sinch-comp-sheet-size-padding);
    gap: var(--sinch-comp-sheet-size-gap);
    max-width: unset;
    max-height: unset;
    box-sizing: border-box;
    contain: content;
    background-color: var(--sinch-comp-sheet-color-background);
    border: none;
    outline: none;
    opacity: 0;
    transition-property: transform, opacity;
    transition-duration: var(--sinch-comp-sheet-animation-duration), calc(var(--sinch-comp-sheet-animation-duration) / 2.5);
    transition-timing-function: var(--sinch-comp-sheet-animation-easing);
  }

  #dialog.overlay-push {
    opacity: 0.5;
  }

  #dialog[open],
  #dialog[open].placement-right,
  #dialog[open].placement-left,
  #dialog[open].placement-top,
  #dialog[open].placement-bottom {
    transform: translateX(0) translateY(0);
    opacity: 1;
  }

  #dialog.placement-right {
    top: 0;
    right: 0;
    margin-left: auto;
    height: 100dvh;
    transform: translateX(100%);
    max-width: var(--sinch-comp-sheet-size-max-horizontal);
  }

  #dialog.placement-left {
    top: 0;
    left: 0;
    margin-right: auto;
    height: 100dvh;
    transform: translateX(-100%);
    max-width: var(--sinch-comp-sheet-size-max-horizontal);
  }

  #dialog.placement-top {
    top: 0;
    left: 0;
    right: 0;
    width: 100%;
    transform: translateY(-100%);
    max-height: var(--sinch-comp-sheet-size-max-vertical);
  }

  #dialog.placement-bottom {
    bottom: 0;
    left: 0;
    right: 0;
    width: 100%;
    margin-top: auto;
    transform: translateY(100%);
    max-height: var(--sinch-comp-sheet-size-max-vertical);
  }

  #dialog::backdrop {
    display: block;
    background: linear-gradient(var(--sinch-comp-sheet-color-backdrop-from), var(--sinch-comp-sheet-color-backdrop-to));
    backdrop-filter: blur(var(--sinch-comp-sheet-size-backdrop-blur));
  }

  #header {
    display: flex;
    flex-direction: row;
    align-items: center;
    margin-top: 8px;
    gap: 8px;

    --sinch-global-size-icon: 24px;
    --sinch-global-color-icon: var(--sinch-comp-dialog-color-default-icon-initial);
  }

  #caption {
    --sinch-global-color-text: var(--sinch-comp-sheet-color-title);
    --sinch-comp-title-font: var(--sinch-comp-sheet-font-title);
  }

  #content {
    min-height: 0;
    overflow: auto;
    overscroll-behavior: contain;
  }

  #action {
    display: flex;
    flex-direction: row;
    justify-content: flex-end;
    gap: 16px;
  }

  #action.empty {
    display: none;
  }

  #close {
    display: var(--sinch-sheet-close-button-display, initial);
    margin-left: auto;
  }

  @media screen and (max-width: 576px) {
    #dialog.placement-right,
    #dialog.placement-left {
      max-width: 100dvw;
    }
  }
</style>

<dialog id="dialog">
  <div id="header">
    <slot id="icon" name="icon"></slot>
    <sinch-title id="caption" type="m" level="3"></sinch-title>
    <sinch-button id="close" size="s">
      <sinch-icon icons-version="2" name="fa-xmark" id="icon-close" slot="icon"></sinch-icon>
    </sinch-button>
  </div>
  <div id="content">
    <sinch-stop-events events="close">
      <slot name="content"></slot>
    </sinch-stop-events>
  </div>
  <div id="action">
    <sinch-stop-events events="close">
      <slot name="buttons"></slot>
    </sinch-stop-events>
  </div>
</dialog>
