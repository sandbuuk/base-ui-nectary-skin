<style>
:host {
  display: table-cell;
  border-bottom: 1px solid var(--sinch-comp-table-color-head-cell-default-border-initial);
  vertical-align: middle;
}

#wrapper {
  position: relative;
  display: flex;
  align-items: center;
  gap: 8px;
  width: 100%;
  height: 100%;
  padding: 8px;
  box-sizing: border-box;

  --sinch-global-color-icon: var(--sinch-comp-table-color-head-cell-default-icon-initial);
}

#text {
  flex-shrink: 1;
  min-width: 0;

  --sinch-global-color-text: var(--sinch-comp-table-color-head-cell-default-text-initial);
}

#text:empty {
  display: none;
}

:host([align="center"]) > #wrapper {
  justify-content: center;
}

:host([align="end"]) > #wrapper {
  justify-content: flex-end;
}

:host([fit]) {
  /* 1px instead of 0, because of Safari */
  width: 1px;
}
</style>

<div id="wrapper">
  <slot name="checkbox"></slot>
  <slot name="left"></slot>
  <sinch-text id="text" type="m"></sinch-text>
  <slot name="tooltip"></slot>
  <slot name="right"></slot>
</div>
