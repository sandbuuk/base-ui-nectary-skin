<style>
  :host {
    display: inline-block;
    position: relative;
    height: 96px;
    max-width: 300px;
  }

  #button {
    all: initial;
    border: 1px solid var(--sinch-color-stormy-200);
    box-sizing: border-box;
    border-radius: 2px;
    width: 100%;
    margin: 2px 0;
    padding: 8px 37px 8px 12px;
    font: var(--sinch-font-body);
    color: var(--sinch-color-text-default);
  }

  #button:disabled {
    border-color: var(--sinch-color-snow-500);
    color: var(--sinch-color-stormy-100);
  }

  #button:focus {
    border-color: var(--sinch-color-stormy-300);
  }

  :host([invalidtext]) #button:not(:disabled) {
    border-color: var(--sinch-color-text-invalid);
  }

  #dropdown-icon {
    position: absolute;
    right: 16px;
    top: 43px;
    fill: var(--sinch-color-stormy-500);
    pointer-events: none;
  }

  #top,
  #bottom {
    display: flex;
    align-items: baseline;
  }

  #top {
    line-height: 24px;
  }

  #bottom {
    line-height: 20px;
  }

  #label,
  #optional,
  #additional,
  #invalid {
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    max-width: 50%;
  }

  #optional,
  #additional {
    margin-left: auto;
  }

  #label {
    font: var(--sinch-font-title-4);
    color: var(--sinch-color-text-default);
  }

  #optional {
    font: var(--sinch-font-small-text);
    color: var(--sinch-color-text-muted);
  }

  #additional {
    font: var(--sinch-font-extra-small-text);
    color: var(--sinch-color-text-muted);
  }

  #invalid {
    font: var(--sinch-font-extra-small-text);
    color: var(--sinch-color-text-invalid);
  }

  :host([disabled]) #label,
  :host([disabled]) #additional,
  :host([disabled]) #optional,
  :host([disabled]) #invalid,
  :host([disabled]) #dropdown-icon {
    color: var(--sinch-color-stormy-100);
  }

  ::slotted(sinch-input-tooltip) {
    align-self: center;
    margin: 0 8px;
  }

  #hidden {
    display: none;
  }

  #listbox {
    position: absolute;
    left: 0;
    top: 68px;
    width: 100%;
    display: none;
    list-style: none;
    background-color: white;
  }

  #listbox > label {
    display: block;
  }

  #listbox > input,
  #submit {
    all: initial;
    width: 0;
    height: 0;
    overflow: hidden;
  }

  #listbox > label:active,
  #listbox > label:hover,
  #listbox > input:focus + label {
    background-color: lightgray;
  }

  #listbox > input[data-checked] + label {
    background-color: red;
  }

  #button[aria-expanded="true"] {
    border-bottom-left-radius: 0;
    border-bottom-right-radius: 0;
  }

  #button[aria-expanded="true"] ~ #listbox {
    display: block;
  }
</style>

<div id="top">
  <label id="label" for="button"></label>
  <slot name="tooltip"></slot>
  <span id="optional"></span>
</div>
<button
  id="button"
  aria-haspopup="listbox"
  aria-expanded="false"
  aria-labelledby="label button"
>Option 1</button>
<svg id="dropdown-icon" width="12" height="8">
  <path d="M1.41.59 6 5.17 10.59.59 12 2 6 8 0 2 1.41.59Z"/>
</svg>
<div id="bottom">
  <span id="invalid"></span>
  <span id="additional"></span>
</div>
<div id="hidden">
  <slot name="select"></slot>
</div>
<form
  id="listbox"
  role="listbox"
  aria-activedescendant="option1"
  tabindex="-1"
  onsubmit="return false"
></form>
