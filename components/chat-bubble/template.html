<style>
:host {
  display: block;
  outline: none;
}

#wrapper {
  position: relative;
  padding: 12px 16px;
  border-radius: 16px;
  max-width: 595px;
  box-sizing: border-box;
}

:host([data-type="customer"]) > #wrapper {
  background-color: var(--sinch-sys-color-container-contrast-primary-default);
  border-top-left-radius: 0;
}

:host([data-type="agent-prev"]) > #wrapper {
  background-color: var(--sinch-sys-color-container-contrast-primary-active);
  border-top-right-radius: 0;
}

:host([data-type="agent"]) > #wrapper {
  background-color: var(--sinch-sys-color-container-complement-primary-hover);
  border-top-right-radius: 0;
}

#text {
  --sinch-global-color-text: var(--sinch-sys-color-text-default);
}

#icon-sending,
#icon-sent,
#icon-received,
#icon-seen,
#icon-error {
  display: none;
  position: absolute;
  right: 16px;
  bottom: 12px;
  height: 16px;
}

#icon-sending {
  fill: var(--sinch-sys-color-text-default);
}

#icon-sent {
  fill: var(--sinch-sys-color-text-default);
}

#icon-received {
  fill: var(--sinch-sys-color-text-default);
}

#icon-seen {
  fill: var(--sinch-sys-color-feedback-success-contrast);
}

#icon-error {
  fill: var(--sinch-sys-color-feedback-invalid-contrast);
}

:host([status="sending"]) #icon-sending,
:host([status="sent"]) #icon-sent,
:host([status="received"]) #icon-received,
:host([status="seen"]) #icon-seen,
:host([status="error"]) #icon-error {
  display: block;
}

:host([status]:not([status=""])) #wrapper {
  padding-right: 42px;
}
</style>
