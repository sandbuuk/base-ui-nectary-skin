<style>
:host {
  display: inline-flex;
  flex-direction: column;
  position: relative;
}

#badge-wrapper {
  position: absolute;
  left: 0;
  top: 0;
  width: fit-content;
  border-radius: var(--sinch-comp-badge-shape-radius);
  padding: 1px;
  pointer-events: none;
  background-color: var(--sinch-comp-badge-color-border);
}

#badge {
  box-sizing: border-box;
  color: var(--sinch-comp-badge-color-text);
  background-color: var(--sinch-comp-badge-color-background);
  width: 20px;
  height: 20px;
  border-radius: var(--sinch-comp-badge-shape-radius);
}

#badge.long {
  width: fit-content;
  padding: 0 5px;
}

#text {
  display: block;
  width: 100%;
  height: 100%;
  text-align: center;
  font: var(--sinch-comp-badge-font-size-l);
  line-height: 20px;
  text-rendering: optimizelegibility;
}

:host([size="m"]) #badge-wrapper {
  left: calc(100% - 8px);
  top: -8px;
}

:host([size="m"]) #badge {
  width: 14px;
  height: 14px;
}

:host([size="m"]) #badge.long {
  width: fit-content;
  padding: 0 3px;
}

:host([size="m"]) #text {
  font: var(--sinch-comp-badge-font-size-m);
  line-height: 14px;
}

:host([size="s"]) #badge {
  width: 8px;
  height: 8px;
  padding: 0;
}

:host([size="s"]) #text {
  display: none;
}

:host([hidden]) #badge-wrapper {
  display: none;
}
</style>

<slot id="slot"></slot>
<div id="badge-wrapper">
  <div id="badge">
    <span id="text"></span>
  </div>
</div>
