<style>
:host {
  --sinch-color-alert-info-background: #D5E5F8;
  --sinch-color-alert-success-background: #D7F1D8;
  --sinch-color-alert-warn-background: #FFE8D6;
  --sinch-color-alert-error-background: #FCD7D4;

  display: inline-block;
}

#wrapper {
  display: flex;
  flex-direction: row;
  align-items: center;
  column-gap: 12px;
  position: relative;
  padding: 12px 16px 12px 56px;
  border-radius: 4px;
  font: var(--sinch-font-body);
  color: var(--sinch-color-stormy-600);
  background-color: var(--sinch-color-alert-info-background);
}

#title {
  display: none;
  font: var(--sinch-font-title-4);
  margin: 0;
  margin-bottom: 4px;
}

#text {
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
  margin: 0;
}

#icon-info,
#icon-success,
#icon-warn,
#icon-error {
  display: none;
  position: absolute;
  left: 18px;
  top: 14px;
}

#dismiss {
  all: initial;
  display: none;
  position: absolute;
  width: 24px;
  height: 24px;
  right: 16px;
  top: 12px;
  cursor: pointer;
}

#dismiss > * {
  display: block;
  margin: auto;
  pointer-events: none;
}

#action {
  all: initial;
  display: none;
  padding: 9px 16px;
  border: 1px solid var(--sinch-color-stormy-500);
  border-radius: 4px;
  font: var(--sinch-font-body);
  font-size: 14px;
  line-height: 14px;
  color: var(--sinch-color-stormy-500);
  white-space: nowrap;
  text-overflow: ellipsis;
  overflow: hidden;
  cursor: pointer;
  height: 32px;
  box-sizing: border-box;
  margin-left: auto;
}

:host([type="success"]) #wrapper {
  background-color: var(--sinch-color-alert-success-background);
}

:host([type="warn"]) #wrapper {
  background-color: var(--sinch-color-alert-warn-background);
}

:host([type="error"]) #wrapper {
  background-color: var(--sinch-color-alert-error-background);
}

:host([type="info"]) #wrapper {
  background-color: var(--sinch-color-alert-info-background);
}

:host([type="success"]) #icon-success {
  display: block;
}

:host([type="warn"]) #icon-warn {
  display: block;
}

:host([type="error"]) #icon-error {
  display: block;
}

:host(:not([type])) #icon-info,
:host([type="info"]) #icon-info {
  display: block;
}

:host([dismissable]) #wrapper {
  padding-right: 52px;
}

:host([dismissable]) #dismiss {
  display: block;
}

:host([multiline]) #wrapper {
  flex-direction: column;
  align-items: flex-start;
}

:host(:not([multiline])[action-text]:not([action-text=""])) #icon-info,
:host(:not([multiline])[action-text]:not([action-text=""])) #icon-success,
:host(:not([multiline])[action-text]:not([action-text=""])) #icon-warn,
:host(:not([multiline])[action-text]:not([action-text=""])) #icon-error {
  top: 18px;
}

:host(:not([multiline])[action-text]:not([action-text=""])) #dismiss {
  top: 16px;
}

:host([multiline]) #action {
  margin-left: unset;
  margin-top: 16px;
  align-self: flex-start;
  max-width: 100%;
}

:host([action-text]:not([action-text=""])) #action {
  display: block;
}

:host([multiline][title]:not([title=""])) #title {
  display: block;
}

:host([multiline]) #text {
  overflow: unset;
  text-overflow: unset;
  white-space: unset;
}

</style>

<div id="wrapper">
  <svg id="icon-info" width="20" height="20" viewBox="0 0 20 20"><path d="M10 0C4.48 0 0 4.48 0 10s4.48 10 10 10 10-4.48 10-10S15.52 0 10 0Zm0 15c-.55 0-1-.45-1-1v-4c0-.55.45-1 1-1s1 .45 1 1v4c0 .55-.45 1-1 1Zm1-8H9V5h2v2Z" fill="#2071CE"/></svg>
  <svg id="icon-success" width="20" height="20" viewBox="0 0 20 20"><path d="M10 0C4.48 0 0 4.48 0 10s4.48 10 10 10 10-4.48 10-10S15.52 0 10 0ZM7.29 14.29 3.7 10.7a.996.996 0 1 1 1.41-1.41L8 12.17l6.88-6.88a.996.996 0 1 1 1.41 1.41L8.7 14.29a.996.996 0 0 1-1.41 0Z" fill="#2E8540"/></svg>
  <svg id="icon-warn" width="20" height="20" viewBox="0 0 20 20"><path d="M2.47 18h15.06c1.54 0 2.5-1.67 1.73-3L11.73 1.99c-.77-1.33-2.69-1.33-3.46 0L.74 15c-.77 1.33.19 3 1.73 3ZM10 11c-.55 0-1-.45-1-1V8c0-.55.45-1 1-1s1 .45 1 1v2c0 .55-.45 1-1 1Zm1 4H9v-2h2v2Z" fill="#FF8C34"/></svg>
  <svg id="icon-error" width="20" height="20" viewBox="0 0 18 18"><path d="M12.32 0H5.68c-.26 0-.52.11-.7.29L.29 4.98c-.18.18-.29.44-.29.7v6.63c0 .27.11.52.29.71l4.68 4.68c.19.19.45.3.71.3h6.63c.27 0 .52-.11.71-.29l4.68-4.68a.99.99 0 0 0 .29-.71V5.68c0-.27-.11-.52-.29-.71L13.02.29c-.18-.18-.44-.29-.7-.29ZM9 14.3c-.72 0-1.3-.58-1.3-1.3 0-.72.58-1.3 1.3-1.3.72 0 1.3.58 1.3 1.3 0 .72-.58 1.3-1.3 1.3ZM9 10c-.55 0-1-.45-1-1V5c0-.55.45-1 1-1s1 .45 1 1v4c0 .55-.45 1-1 1Z" fill="#E31C3D"/></svg>
  <p id="title"></p>
  <p id="text"></p>
  <button id="action"></button>
  <button id="dismiss">
    <svg width="14" height="14" viewBox="0 0 14 14"><path d="M13.3.71a.996.996 0 0 0-1.41 0L7 5.59 2.11.7A.996.996 0 1 0 .7 2.11L5.59 7 .7 11.89a.996.996 0 1 0 1.41 1.41L7 8.41l4.89 4.89a.996.996 0 1 0 1.41-1.41L8.41 7l4.89-4.89c.38-.38.38-1.02 0-1.4Z" fill="#0A273D"/></svg>
  </button>
</div>
