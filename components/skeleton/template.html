<style>
:host {
  display: block;
}

#wrapper {
  position: relative;
  display: flex;
  flex-direction: column;
  gap: 16px;
  height: 100%;
  box-sizing: border-box;
  overflow: hidden;
}

:host([card]:not([card="false"])) > #wrapper {
  padding: 16px;
  background-color: var(--sinch-color-snow-100);
  border-radius: var(--sinch-shape-radius-l);
  border: 1px solid var(--sinch-color-snow-500);
}

#shimmer {
  position: absolute;
  inset: 0;
  background-image:
    linear-gradient(
      90deg,
      transparent 0,
      var(--sinch-color-snow-400) 100px,
      transparent 200px
    );
  clip-path: url("#clip");
}

#svg {
  display: block;
  width: 0;
  height: 0;
}
</style>

<svg id="svg">
  <defs>
    <clipPath id="clip"></clipPath>
  </defs>
</svg>
<div id="wrapper">
  <slot></slot>
  <div id="shimmer"></div>
</div>
