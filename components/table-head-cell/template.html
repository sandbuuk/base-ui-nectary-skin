<style>
:host {
  display: table-cell;
  border-bottom: 1px solid var(--sinch-color-stormy-200);
  vertical-align: middle;

  --sinch-color-icon: var(--sinch-color-stormy-200);
}

#wrapper {
  position: relative;
  display: flex;
  align-items: center;
  gap: 8px;
  width: 100%;
  height: 100%;
  padding: 8px;
  box-sizing: border-box;
  font: var(--sinch-font-title-s);
  color: var(--sinch-color-stormy-300);

  --sinch-icon-button-color: var(--sinch-color-stormy-100);
}

#text {
  flex-shrink: 1;
  min-width: 0;
  font: var(--sinch-font-title-s);
  color: var(--sinch-color-stormy-200);
}

:host([align="center"]) > #wrapper {
  justify-content: center;
}

:host([align="end"]) > #wrapper {
  justify-content: flex-end;
}

:host(:is([text=""], :not([text]))) #text {
  display: none;
}

:host([fit]:not([fit="false"])) {
  /* 1px instead of 0, because of Safari */
  width: 1px;
}
</style>

<div id="wrapper">
  <slot name="checkbox"></slot>
  <slot name="left"></slot>
  <span id="text"></span>
  <slot name="tooltip"></slot>
  <slot name="right"></slot>
</div>
