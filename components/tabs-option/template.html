<style>
:host {
  display: block;
  outline: none;
}

:host() > * {
  pointer-events: none;
}

#wrapper {
  display: flex;
  flex-direction: row;
  align-items: center;
  gap: 12px;
  position: relative;
  width: 100%;
  height: 42px;
  padding: 8px 20px;
  box-sizing: border-box;
  box-shadow: 0 1px 0 0 var(--sinch-color-stormy-100);
  color: var(--sinch-color-stormy-500);
  background-color: var(--sinch-color-snow-100);

  --sinch-color-icon: var(--sinch-color-stormy-500);
  --sinch-size-icon: 16px;
}

#content {
  font: var(--sinch-font-title-s);
  flex-shrink: 1;
  overflow: hidden;
  white-space: nowrap;
  text-overflow: ellipsis;
}

:host([checked]:not([checked="false"])) #wrapper {
  box-shadow: 0 2px 0 0 var(--sinch-color-stormy-500);
}

#button {
  all: initial;
  position: absolute;
  left: 0;
  top: 0;
  box-sizing: border-box;
  width: 100%;
  height: 100%;
  cursor: pointer;
}

#button:disabled {
  cursor: unset;
}

:host([disabled]:not([disabled="false"])) #wrapper {
  color: var(--sinch-color-stormy-100);

  --sinch-color-icon: var(--sinch-color-stormy-100);
}

</style>

<div id="wrapper">
  <slot name="icon"></slot>
  <label for="input" id="content"></label>
  <button id="button" type="radio"/>
</div>
