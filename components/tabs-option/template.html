<style>
:host {
  display: block;
}

#button {
  all: initial;
  position: relative;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  width: 100%;
  padding: 12px 16px;
  box-sizing: border-box;
  cursor: pointer;
  border-top-left-radius: var(--sinch-shape-radius-l);
  border-top-right-radius: var(--sinch-shape-radius-l);
  height: 40px;
  color: var(--sinch-color-stormy-300);

  --sinch-color-icon: var(--sinch-color-stormy-300);
  --sinch-size-icon: 16px;
}

#button:hover {
  background-color: var(--sinch-color-tropical-100);
}

#button:focus-visible::before {
  content: "";
  position: absolute;
  inset: 0;
  bottom: -3px;
  border: 2px solid var(--sinch-color-border-focus);
  border-top-left-radius: var(--sinch-shape-radius-l);
  border-top-right-radius: var(--sinch-shape-radius-l);
  pointer-events: none;
}

:host([data-checked]) #button {
  color: var(--sinch-color-tropical-500);

  --sinch-color-icon: var(--sinch-color-tropical-500);
}

:host([data-checked]) #button::after {
  content: "";
  position: absolute;
  left: 4px;
  right: 4px;
  bottom: -1px;
  pointer-events: none;
  border-top: 2px solid var(--sinch-color-tropical-500);
}

#button:disabled {
  cursor: unset;
  pointer-events: none;
  color: var(--sinch-color-border-default);

  --sinch-color-icon: var(--sinch-color-border-default);
}

#text {
  flex-shrink: 1;
  flex-basis: auto;
  min-width: 0;
}

::slotted(*) {
  display: block;
}
</style>

<button id="button">
  <slot name="icon"></slot>
  <sinch-text id="text" type="m" ellipsis></sinch-text>
</button>
