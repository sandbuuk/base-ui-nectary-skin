<style>
:host {
  display: inline-block;
  vertical-align: middle;
  outline: none;
}

#wrapper {
  position: relative;
  width: 32px;
  height: 32px;
  font: var(--sinch-font-title-xs);
  line-height: 30px;
  color: var(--sinch-color-text-default);
  background-color: var(--sinch-color-snow-700);
  text-align: center;
  border-radius: 50%;
  border: 1px solid var(--sinch-color-snow-100);
  box-sizing: border-box;
}

:host([background="blue"]) #wrapper {
  background-color: var(--sinch-color-stormy-500);
  color: var(--sinch-color-snow-100);
}

:host([background="yellow"]) #wrapper {
  background-color: var(--sinch-color-honey-500);
}

:host([size="l"]) #wrapper {
  width: 40px;
  height: 40px;
  font: var(--sinch-font-title-s);
  line-height: 38px;
}

:host([size="s"]) #wrapper {
  width: 24px;
  height: 24px;
  font: var(--sinch-font-extra-small-text);
  line-height: 22px;
}

#text {
  display: block;
  width: 100%;
  height: 100%;
  box-sizing: border-box;
}

#image {
  display: none;
  width: 100%;
  height: 100%;
  object-fit: contain;
  position: absolute;
  left: 0;
  top: 0;
  border-radius: 50%;
}

:host([src]:not([src=""])) #image {
  display: block;
}

::slotted(sinch-avatar-badge) {
  position: absolute;
  top: -1px;
  left: calc(100% - 9px);
}

::slotted(sinch-avatar-status) {
  position: absolute;
  bottom: -1px;
  right: -1px;
}
</style>

<div id="wrapper">
  <span id="text"></span>
  <img id="image" alt=""/>
  <slot name="badge"></slot>
  <slot name="status"></slot>
</div>
