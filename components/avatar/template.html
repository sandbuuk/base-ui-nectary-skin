<style>
:host {
  display: inline-block;
  vertical-align: middle;
  outline: none;
}

#wrapper {
  position: relative;
  width: 40px;
  height: 40px;
  background-color: var(--sinch-color-snow-100);
  border-radius: 50%;

  --sinch-avatar-badge-size: 16px;
  --sinch-avatar-badge-font: 700 12px/14px "Gilroy", "Arial", "sans-serif";
}

#circle {
  position: relative;
  width: calc(100% - 2px);
  height: calc(100% - 2px);
  left: 1px;
  top: 1px;
  border-radius: 50%;
  /* stylelint-disable-next-line property-no-vendor-prefix */
  -webkit-mask: linear-gradient(#fff, #000);
  mask: linear-gradient(#fff, #000);
  background-color: var(--sinch-avatar-color-default-bg);
  color: var(--sinch-avatar-color-default-fg);
}

#text {
  display: block;
  width: 100%;
  height: 100%;
  font: var(--sinch-font-title-s);
  line-height: 38px;
  text-transform: uppercase;
  text-align: center;
}

:host([size="l"]) #wrapper {
  width: 56px;
  height: 56px;

  --sinch-avatar-badge-size: 20px;
  --sinch-avatar-badge-font: 700 12px/18px "Gilroy", "Arial", "sans-serif";
}

:host([size="l"]) #text {
  font: var(--sinch-font-title-m);
  line-height: 54px;
}

:host([size="s"]) #wrapper {
  width: 24px;
  height: 24px;

  --sinch-avatar-badge-size: 11px;
  --sinch-avatar-badge-font: 500 8px/9px "Gilroy", "Arial", "sans-serif";
}

:host([size="s"]) #text {
  font: var(--sinch-font-extra-small-text);
  line-height: 22px;
}

#image {
  display: none;
  position: absolute;
  left: 0;
  top: 0;
  width: 100%;
  height: 100%;
  object-fit: contain;
}

:host([src]:not([src=""])) #image {
  display: block;
}

#status-wrapper {
  position: absolute;
  left: calc(85% - 5px);
  top: calc(85% - 5px);
  width: 10px;
  height: 10px;
  padding: 1px;
  box-sizing: border-box;
  border-radius: 50%;
  background-color: var(--sinch-color-snow-100);
  display: none;
  pointer-events: none;
}

#status {
  width: 8px;
  height: 8px;
  border-radius: 50%;
}

:host([status="online"]) #status-wrapper,
:host([status="away"]) #status-wrapper,
:host([status="busy"]) #status-wrapper,
:host([status="offline"]) #status-wrapper {
  display: block;
}

:host([status="online"]) #status {
  background-color: var(--sinch-avatar-status-color-online);
}

:host([status="away"]) #status {
  background-color: var(--sinch-avatar-status-color-away);
}

:host([status="busy"]) #status {
  background-color: var(--sinch-avatar-status-color-busy);
}

:host([status="offline"]) #status {
  background-color: var(--sinch-avatar-status-color-offline);
}
</style>

<div id="wrapper">
  <div id="circle">
    <span id="text"></span>
    <img id="image" alt=""/>
  </div>
  <div id="status-wrapper">
    <div id="status"></div>
  </div>
</div>
