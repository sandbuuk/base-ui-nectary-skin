<style>
:host {
  display: block;
  outline: none;
}

#listbox {
  display: flex;
  flex-direction: row;
  flex-wrap: wrap;
  padding: 4px 10px;
  overflow-y: auto;
}

#listbox:empty {
  display: none;
}

#check {
  position: absolute;
  left: 10px;
  top: 16px;

  --sinch-color-icon: var(--sinch-color-stormy-500);
  --sinch-size-icon: 24px;
}

#check.inverted {
  --sinch-color-icon: var(--sinch-color-snow-100);
}

.option {
  position: relative;
  cursor: pointer;
  width: 32px;
  height: 32px;
  padding: 12px 6px;
}

.option::after {
  content: "";
  position: absolute;
  width: 34px;
  height: 34px;
  inset: 9px 3px;
  border: 2px solid transparent;
  border-radius: 50%;
  pointer-events: none;
}

.option[data-selected]:not([data-checked])::after {
  border-color: var(--sinch-color-aqua-400);
}

sinch-color-swatch {
  pointer-events: none;
}
</style>

<sinch-icon-check id="check"></sinch-icon-check>
<div id="listbox" role="presentation"></div>
