<style>
:host {
  display: block;
  outline: none;
}

#listbox {
  display: flex;
  flex-direction: row;
  flex-wrap: wrap;
  padding: 4px 10px;
  overflow-y: auto;
}

#listbox:empty {
  display: none;
}

.option {
  padding: 12px 6px;

  --sinch-color-icon: var(--sinch-color-stormy-500);
}

.swatch-wrapper {
  position: relative;
  cursor: pointer;
  width: 32px;
  height: 32px;
}

.swatch-wrapper::after {
  content: "";
  position: absolute;
  width: 34px;
  height: 34px;
  inset: -3px;
  border: 2px solid transparent;
  border-radius: 50%;
  pointer-events: none;
}

.option[data-selected]:not([data-checked]) .swatch-wrapper::after {
  border-color: var(--sinch-color-border-focus);
}

.check {
  display: none;
  position: absolute;
  left: 4px;
  top: 4px;
  pointer-events: none;

  --sinch-size-icon: 24px;
}

.option[data-checked] .check {
  display: block;
}
</style>

<div id="listbox" role="presentation"></div>
