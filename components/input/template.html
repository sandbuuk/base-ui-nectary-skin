<style>
:host {
  display: inline-block;
  vertical-align: middle;
  outline: none;

  --sinch-color-icon: var(--sinch-color-stormy-500);
}

#wrapper {
  width: 100%;
  box-sizing: border-box;
}

#input-wrapper {
  display: flex;
  flex-direction: row;
  align-items: center;
  gap: 4px;
  border: 1px solid var(--sinch-color-stormy-200);
  box-sizing: border-box;
  border-radius: var(--sinch-shape-radius-s);
  width: 100%;
  height: 48px;
  margin: 2px 0;
  padding: 0 8px;
  background-color: var(--sinch-color-snow-100);
}

#input {
  all: initial;
  flex: 1;
  min-width: 0;
  height: 48px;
  padding: 0 4px;
  font: var(--sinch-font-body);
  color: var(--sinch-color-text-default);
  caret-color: var(--sinch-caret-color, auto);
}

#input::placeholder {
  font: var(--sinch-font-body);
  color: var(--sinch-color-text-muted);
}

#input:disabled {
  border-color: var(--sinch-color-snow-500);
  color: var(--sinch-color-stormy-100);
}

#input:disabled::placeholder {
  color: var(--sinch-color-snow-500);
}

#input:focus {
  border-color: var(--sinch-color-stormy-600);
}

#input[type="password"] {
  font-size: 1.5em;
  letter-spacing: 0.1em;
}

:host([invalidtext]:not([invalidtext=""]):not([disabled])) #input-wrapper {
  border-color: var(--sinch-color-text-invalid);
}

#top,
#bottom {
  display: flex;
  align-items: baseline;
}

#top {
  height: 24px;
}

#bottom {
  height: 20px;
}

#label,
#optional,
#additional,
#invalid {
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}

#label {
  font: var(--sinch-font-title-s);
  color: var(--sinch-color-text-default);
}

#optional {
  flex: 1;
  text-align: right;
  font: var(--sinch-font-small-text);
  color: var(--sinch-color-text-muted);
}

#additional {
  flex: 1;
  text-align: right;
  font: var(--sinch-font-extra-small-text);
  color: var(--sinch-color-text-muted);
}

#invalid {
  font: var(--sinch-font-extra-small-text);
  color: var(--sinch-color-text-invalid);
}

#right {
  display: flex;
  flex-direction: row;
  align-self: stretch;
  align-items: center;
  gap: 4px;
  padding-right: 8px;
}

#right.empty {
  display: none;
}

::slotted(sinch-help-tooltip) {
  align-self: center;
  margin: 0 8px;
}

:host([disabled]:not([disabled="false"])) :is(#label, #additional, #optional, #invalid) {
  color: var(--sinch-color-stormy-100);
}

/* stylelint-disable-next-line no-descending-specificity */
:host([disabled]:not([disabled="false"])) {
  --sinch-color-icon: var(--sinch-color-stormy-100);
}
</style>

<div id="wrapper">
  <div id="top">
    <label id="label" for="input"></label>
    <slot name="tooltip"></slot>
    <span id="optional"></span>
  </div>
  <div id="input-wrapper">
    <input id="input" type="text"/>
    <div id="right">
      <slot name="right"></slot>
    </div>
  </div>
  <div id="bottom">
    <span id="invalid"></span>
    <span id="additional"></span>
  </div>
</div>
