<style>
  :host {
    display: inline-block;
    height: 96px;
    max-width: 300px;
  }

  #input {
    all: initial;
    box-sizing: border-box;
    width: 100%;
    height: 46px;
    padding: 0 12px;
    font: var(--sinch-font-body);
    color: var(--sinch-input-text-color);
    border: 1px solid red;
    border-radius: 4px;
    margin-bottom: 2px;
    margin-top: 2px;
  }

  #top {
    line-height: 24px;
    display: flex;
    align-items: baseline;
    justify-content: space-between;
  }
  #bottom {
    line-height: 20px;
    display: flex;
    align-items: baseline;
    justify-content: space-between;
  }

  #label, #optional, #additional, #invalid {
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    max-width: 50%;
  }

  #label {
    font: var(--sinch-font-title-4);
  }

  #optional {
    font: var(--sinch-font-small-text);
  }

  #additional {
    font: var(--sinch-font-extra-small-text);
  }

  #invalid {
    font: var(--sinch-font-extra-small-text);
  }
</style>


<div id="top">
  <label id="label" for="input"></label>
  <span id="optional"></span>
</div>
<input id="input" type="text"/>
<div id="bottom">
  <span id="invalid"></span>
  <span id="additional"></span>
</div>
