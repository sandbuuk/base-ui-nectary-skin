<style>
:host {
  display: block;
}

#wrapper {
  display: flex;
  flex-direction: row;
  align-items: flex-start;
  padding: 12px 16px;
  box-sizing: border-box;
  min-height: 48px;
  min-width: 148px;
  background-color: var(--sinch-color-bg-primary-contrast);
  border-radius: var(--sinch-shape-radius-m);
}

:host([type="error"]) #wrapper {
  background-color: var(--sinch-color-feedback-invalid-bg);
}

#content-wrapper {
  display: flex;
  flex-direction: column;
  gap: 8px;
  flex: 1;
  min-width: 0;
  min-height: 24px;
  margin-left: 16px;
  color: var(--sinch-color-stormy-500);
}

#icon,
#icon-loading {
  display: none;

  --sinch-color-icon: var(--sinch-color-stormy-500);
}

#action {
  display: flex;
  gap: 4px;
  height: 32px;
  margin-top: -4px;
  margin-bottom: -4px;
}

:host([type="loading"]) #icon-loading,
:host([type="pending"]) #icon,
:host([type="progress"]) #icon,
:host([type="success"]) #icon,
:host([type="error"]) #icon {
  display: block;
}

:host([type="success"]) #icon {
  --sinch-color-icon: var(--sinch-color-feedback-success-icon);
}

:host([type="error"]) #icon {
  --sinch-color-icon: var(--sinch-color-feedback-invalid-icon);
}
</style>

<div id="wrapper">
  <sinch-spinner id="icon-loading" size="m"></sinch-spinner>
  <sinch-icon id="icon"></sinch-icon>
  <div id="content-wrapper">
    <sinch-text id="filename" type="m" ellipsis></sinch-text>
    <slot name="content"></slot>
  </div>
  <div id="action">
    <slot name="action"></slot>
  </div>
</div>
