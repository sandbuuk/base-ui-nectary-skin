<style>
:host {
  display: inline-block;
  vertical-align: middle;
  outline: none;
}

#button {
  all: initial;
  position: relative;
  display: flex;
  flex-direction: row;
  align-items: center;
  gap: 4px;
  width: 100%;
  height: 24px;
  padding: 0 5px 0 9px;
  border-radius: 12px;
  background-color: var(--sinch-chip-color-default-bg);
  color: var(--sinch-chip-color-default-fg);
  box-sizing: border-box;
  cursor: pointer;

  --sinch-color-icon: var(--sinch-chip-color-default-fg);
  --sinch-size-icon: 16px;
}

#button:focus-visible::after {
  content: "";
  position: absolute;
  inset: -4px;
  border-radius: 16px;
  border: 2px solid var(--sinch-color-border-focus);
  pointer-events: none;
}

@supports not selector(:focus-visible) {
  #button:focus::after {
    content: "";
    position: absolute;
    inset: -4px;
    border-radius: 16px;
    border: 2px solid var(--sinch-color-border-focus);
    pointer-events: none;
  }

  :host([small]:not([small="false"])) #button:focus::after {
    border-radius: 14px;
  }
}

#text {
  flex: 1;
}

:host([small]:not([small="false"])) #button {
  height: 20px;
  border-radius: 10px;
  padding: 0 3px 0 7px;
}

:host([small]:not([small="false"])) #button:focus-visible::after {
  border-radius: 14px;
}

::slotted(*) {
  margin-left: -4px;
}
</style>

<button id="button">
  <slot name="icon"></slot>
  <sinch-text id="text" type="xs" ellipsis></sinch-text>
  <sinch-icon-cancel id="close"></sinch-icon-cancel>
</button>
