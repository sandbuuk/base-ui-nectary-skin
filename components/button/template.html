<style>
/* stylelint-disable no-descending-specificity */
/* stylelint-disable no-duplicate-selectors */
:host {
  --sinch-button-color-background: var(--sinch-color-tropical-500);
  --sinch-button-color-background-hover: var(--sinch-color-tropical-400);
  --sinch-button-color-background-active: var(--sinch-color-tropical-600);
  --sinch-button-color-background-disabled: var(--sinch-color-tropical-100);
  --sinch-button-color-border: var(--sinch-color-transparent);
  --sinch-button-color-border-disabled: var(--sinch-color-transparent);
  --sinch-button-color-text: var(--sinch-color-snow-100);
  --sinch-button-color-text-disabled: var(--sinch-color-snow-100);
  --sinch-button-shape-radius: var(--sinch-shape-radius-l);

  display: inline-block;
  vertical-align: middle;
  outline: none;
}

#button {
  --sinch-color-icon: var(--sinch-button-color-text);
  --sinch-color-spinner-bg: var(--sinch-color-tropical-300);
  --sinch-color-spinner-fg: var(--sinch-color-snow-100);
}

#button:disabled {
  --sinch-color-icon: var(--sinch-button-color-text-disabled);
  --sinch-color-spinner-bg: var(--sinch-color-snow-100);
  --sinch-color-spinner-fg: var(--sinch-color-tropical-200);
}

:host([small]:not([small="false"])) {
  --sinch-button-shape-radius: var(--sinch-shape-radius-m);
}

:host([type="secondary"]) {
  --sinch-button-color-background: var(--sinch-color-snow-100);
  --sinch-button-color-background-hover: var(--sinch-color-tropical-100);
  --sinch-button-color-background-active: var(--sinch-color-tropical-100);
  --sinch-button-color-background-disabled: var(--sinch-color-snow-100);
  --sinch-button-color-border: var(--sinch-color-tropical-500);
  --sinch-button-color-border-disabled: var(--sinch-color-tropical-200);
  --sinch-button-color-text: var(--sinch-color-tropical-500);
  --sinch-button-color-text-disabled: var(--sinch-color-tropical-200);
}

/* Secondary Spinner */
:host([type="secondary"]) > #button {
  --sinch-color-spinner-bg: var(--sinch-color-tropical-500);
  --sinch-color-spinner-fg: var(--sinch-color-tropical-100);
}

:host([type="secondary"]) #button:enabled:hover,
:host([type="secondary"]) #button:enabled:active {
  --sinch-color-spinner-fg: var(--sinch-color-tropical-200);
}

:host([type="secondary"]) #button:disabled {
  --sinch-color-spinner-bg: var(--sinch-color-tropical-200);
}

:host([type="cta-primary"]) {
  --sinch-button-color-background: var(--sinch-color-honey-500);
  --sinch-button-color-background-hover: var(--sinch-color-honey-400);
  --sinch-button-color-background-active: var(--sinch-color-honey-600);
  --sinch-button-color-background-disabled: var(--sinch-color-honey-200);
  --sinch-button-color-text: var(--sinch-color-stormy-500);
  --sinch-button-color-text-disabled: var(--sinch-color-stormy-300);
}

:host([type="cta-primary"]) > #button {
  --sinch-color-spinner-bg: var(--sinch-color-honey-700);
  --sinch-color-spinner-fg: var(--sinch-color-stormy-500);
}

:host([type="cta-primary"]) > #button:disabled {
  --sinch-color-spinner-bg: var(--sinch-color-honey-100);
  --sinch-color-spinner-fg: var(--sinch-color-stormy-300);
}

:host([type="cta-secondary"]) {
  --sinch-button-color-background: transparent;
  --sinch-button-color-background-hover: var(--sinch-color-snow-500);
  --sinch-button-color-background-active: var(--sinch-color-snow-500);
  --sinch-button-color-background-disabled: transparent;
  --sinch-button-color-text: var(--sinch-color-stormy-500);
  --sinch-button-color-text-disabled: var(--sinch-color-stormy-100);
  --sinch-button-color-border: var(--sinch-color-stormy-500);
  --sinch-button-color-border-disabled: var(--sinch-color-stormy-100);
}

:host([type="cta-secondary"]) > #button {
  --sinch-color-spinner-bg: var(--sinch-color-snow-700);
  --sinch-color-spinner-fg: var(--sinch-color-stormy-500);
}

:host([type="cta-secondary"]) > #button:disabled {
  --sinch-color-spinner-bg: var(--sinch-color-snow-500);
  --sinch-color-spinner-fg: var(--sinch-color-stormy-100);
}

:host([type="cta-secondary"]) > #button::before {
  mix-blend-mode: multiply;
}

:host([type="destructive"]) {
  --sinch-button-color-background: var(--sinch-color-snow-100);
  --sinch-button-color-background-hover: var(--sinch-color-raspberry-100);
  --sinch-button-color-background-active: var(--sinch-color-raspberry-100);
  --sinch-button-color-background-disabled: var(--sinch-color-snow-100);
  --sinch-button-color-text: var(--sinch-color-raspberry-500);
  --sinch-button-color-text-disabled: var(--sinch-color-raspberry-200);
  --sinch-button-color-border: var(--sinch-color-raspberry-500);
  --sinch-button-color-border-disabled: var(--sinch-color-raspberry-200);
}

:host([type="destructive"]) > #button {
  --sinch-color-spinner-bg: var(--sinch-color-raspberry-100);
  --sinch-color-spinner-fg: var(--sinch-color-raspberry-500);
}

:host([type="destructive"]) > #button:enabled:hover,
:host([type="destructive"]) > #button:enabled:active {
  --sinch-color-spinner-bg: var(--sinch-color-raspberry-200);
  --sinch-color-spinner-fg: var(--sinch-color-raspberry-500);
}

:host([type="destructive"]) > #button:disabled {
  --sinch-color-spinner-bg: var(--sinch-color-raspberry-100);
  --sinch-color-spinner-fg: var(--sinch-color-raspberry-200);
}

#button {
  all: initial;
  display: block;
  position: relative;
  width: 100%;
  height: 48px;
  font: var(--sinch-font-title-s);
  color: var(--sinch-button-color-text);
  cursor: pointer;

  --sinch-size-icon: 24px;
}

/* Border */
#button::before {
  content: "";
  position: absolute;
  left: 0;
  top: 0;
  bottom: 0;
  right: 0;
  border: 1px solid var(--sinch-button-color-border);
  border-radius: var(--sinch-button-shape-radius);
  background-color: var(--sinch-button-color-background);
  box-shadow: var(--sinch-elevation-level-1);
  pointer-events: none;
}

#button:focus-visible::after {
  position: absolute;
  content: "";
  left: -4px;
  top: -4px;
  right: -4px;
  bottom: -4px;
  border: 2px solid var(--sinch-color-aqua-400);
  border-radius: calc(var(--sinch-button-shape-radius) + 4px);
  pointer-events: none;
}

@supports not selector(:focus-visible) {
  #button:focus::after {
    position: absolute;
    content: "";
    left: -4px;
    top: -4px;
    right: -4px;
    bottom: -4px;
    border: 2px solid var(--sinch-color-aqua-400);
    border-radius: calc(var(--sinch-button-shape-radius) + 4px);
    pointer-events: none;
  }
}

#button:enabled:hover::before {
  background-color: var(--sinch-button-color-background-hover);
}

#button:enabled:active::before {
  background-color: var(--sinch-button-color-background-active);
  border-width: 2px;
  box-shadow: var(--sinch-elevation-level-0);
}

#button:disabled {
  color: var(--sinch-button-color-text-disabled);
  cursor: initial;
}

#button:disabled::before {
  background-color: var(--sinch-button-color-background-disabled);
  border-color: var(--sinch-button-color-border-disabled);
}

:host([type="primary"]) > #button::before,
:host([type="cta-primary"]) > #button::before {
  border-width: 0;
}

#content {
  position: relative;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 12px;
  width: 100%;
  height: 100%;
  padding: 0 16px;
  box-sizing: border-box;
  pointer-events: none;
}

:host([small]:not([small="false"])) > #button {
  font: var(--sinch-font-title-xs);
  height: 32px;

  --sinch-size-icon: 16px;
}

:host([small]:not([small="false"])) #content {
  padding: 0 12px;
  gap: 8px;
}

#text {
  overflow: hidden;
  white-space: nowrap;
  text-overflow: ellipsis;
  flex-shrink: 1;
  min-width: 0;
}
</style>

<button id="button">
  <div id="content">
    <slot name="left-icon"></slot>
    <span id="text"></span>
    <slot name="right-icon"></slot>
  </div>
</button>
