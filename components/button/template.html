/* Border / Background */
#button::before {
  content: "";
  position: absolute;
  inset: 0;
  background-color: var(--sinch-local-color-background);
  border: 1px solid var(--sinch-local-color-border);
  border-radius: var(--sinch-local-shape-radius);
  box-shadow: var(--sinch-local-shadow);
  pointer-events: none;
}

#button:active::before {
  border-width: 2px;
}

/* Focus Outline */
#button:focus-visible::after {
  position: absolute;
  content: "";
  inset: -3px;
  border: 2px solid var(--sinch-local-color-outline-focus);
  border-radius: calc(var(--sinch-local-shape-radius) + 3px);
  pointer-events: none;
}

#content {
  position: relative;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 0.75em;
  width: 100%;
  height: 100%;
  padding: 0 1em;
  box-sizing: border-box;
  pointer-events: none;
}

#text {
  font: var(--sinch-local-font);
  color: var(--sinch-local-color-text);
  overflow: hidden;
  white-space: nowrap;
  text-overflow: ellipsis;
  flex-shrink: 1;
  min-width: 0;
}
</style>

<button id="button">
  <div id="content">
    <slot name="left-icon"></slot>
    <span id="text"></span>
    <slot name="right-icon"></slot>
  </div>
</button>
