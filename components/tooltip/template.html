<style>
  :host {
    display: contents;
  }

  #content-wrapper {
    padding-bottom: 8px;
    filter: drop-shadow(var(--sinch-comp-tooltip-shadow));
  }

  :host([orientation="left"]) #content-wrapper {
    padding-bottom: 0;
    padding-right: 8px;
  }

  :host([orientation="right"]) #content-wrapper {
    padding-bottom: 0;
    padding-left: 8px;
  }

  :host([orientation^="bottom"]) #content-wrapper {
    padding-bottom: 0;
    padding-top: 8px;
  }

  #content {
    position: relative;
    display: block;
    max-width: 300px;
    padding: 2px 6px;
    box-sizing: border-box;
    background-color: var(--sinch-local-color-background);
    border-radius: var(--sinch-comp-tooltip-shape-radius);
    pointer-events: none;
    opacity: 0;

    --sinch-local-color-background: var(--sinch-comp-tooltip-color-background);
    --sinch-global-color-text: var(--sinch-comp-tooltip-color-text);
  }

  #text {
    word-break: break-word;
    pointer-events: none;

    --sinch-comp-text-font: var(--sinch-comp-tooltip-font-body);
  }

  #tip {
    position: absolute;
    left: 50%;
    top: 100%;
    transform: translateX(-50%) rotate(0);
    transform-origin: top center;
    fill: var(--sinch-local-color-background);
    pointer-events: none;
  }

  #tip.hidden {
    display: none;
  }

  :host([orientation="left"]) #tip {
    transform: translateX(-50%) rotate(270deg);
    top: 50%;
    left: 100%;
  }

  :host([orientation="right"]) #tip {
    transform: translateX(-50%) rotate(90deg);
    top: 50%;
    left: 0;
  }

  :host([orientation^="bottom"]) #tip {
    transform: translateX(-50%) rotate(180deg);
    top: 0;
  }

  :host([text-align="right"]) #text {
    --sinch-comp-text-align: right;
  }

  :host([text-align="center"]) #text {
    --sinch-comp-text-align: center;
  }

  :host([text-align="left"]) #text {
    --sinch-comp-text-align: left;
  }
</style>

<sinch-pop id="pop">
  <slot id="target" slot="target"></slot>
  <div id="content-wrapper" slot="content">
    <div id="content">
      <sinch-text id="text" type="s"></sinch-text>
      <svg id="tip" width="8" height="4" aria-hidden="true">
        <path d="m4 4 4-4h-8l4 4Z" />
      </svg>
    </div>
  </div>
</sinch-pop>
