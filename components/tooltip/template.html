<style>
:host {
  display: contents;
}

#content-wrapper {
  padding-bottom: 8px;
}

#content {
  position: relative;
  display: block;
  max-width: 300px;
  padding: 2px 6px;
  box-sizing: border-box;
  color: var(--sinch-color-text-default);
  background-color: var(--sinch-color-snow-600);
  border-radius: var(--sinch-shape-radius-xs);
  pointer-events: none;
  opacity: 0;
}

:host([orientation="left"]) #content-wrapper {
  padding-bottom: 0;
  padding-right: 8px;
}

:host([orientation="right"]) #content-wrapper {
  padding-bottom: 0;
  padding-left: 8px;
}

:host([orientation^="bottom"]) #content-wrapper {
  padding-bottom: 0;
  padding-top: 8px;
}

#text {
  word-break: break-word;
  pointer-events: none;
}

#tip {
  position: absolute;
  left: 50%;
  top: 100%;
  transform: translateX(-50%) rotate(0);
  transform-origin: top center;
  fill: var(--sinch-color-snow-600);
  pointer-events: none;
}

#tip.hidden {
  display: none;
}

:host([orientation="left"]) #tip {
  transform: translateX(-50%) rotate(270deg);
  top: 50%;
  left: 100%;
}

:host([orientation="right"]) #tip {
  transform: translateX(-50%) rotate(90deg);
  top: 50%;
  left: 0;
}

:host([orientation^="bottom"]) #tip {
  transform: translateX(-50%) rotate(180deg);
  top: 0;
}

:host([inverted]:not([inverted="false"])) #content {
  background-color: var(--sinch-color-stormy-500);
  color: var(--sinch-color-text-inverted);
}

:host([inverted]:not([inverted="false"])) #tip {
  fill: var(--sinch-color-stormy-500);
}
</style>

<sinch-pop id="pop">
  <slot id="target" slot="target"></slot>
  <div id="content-wrapper" slot="content">
    <div id="content">
      <sinch-text id="text" type="s"></sinch-text>
      <svg id="tip" width="8" height="4" aria-hidden="true"><path d="m4 4 4-4h-8l4 4Z"/></svg>
    </div>
  </div>
</sinch-pop>
