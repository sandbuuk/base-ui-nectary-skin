<style>
:host {
  display: inline-block;
  vertical-align: middle;
  outline: none;
}

#wrapper {
  position: relative;
  width: 100%;
  box-sizing: border-box;
}

#listbox {
  display: none;
  position: absolute;
  z-index: 1;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  box-sizing: border-box;
  outline: none;
}

#listbox-body {
  position: absolute;
  left: 0;
  top: calc(100% + 8px);
  min-width: 100%;
  width: max-content;
  box-sizing: border-box;
  font: var(--sinch-font-body);
  color: var(--sinch-color-text-default);
  background-color: var(--sinch-color-snow-100);
  box-shadow: 1px 2px 4px rgb(0 0 0 / 15%);
  overflow-y: auto;
  contain: content;
}

:host([orientation="bottom-left"]) #listbox-body {
  left: unset;
  right: 0;
}

:host([orientation="top-right"]) #listbox-body {
  top: -8px;
  transform: translateY(-100%);
}

:host([orientation="top-left"]) #listbox-body {
  top: -8px;
  transform: translateY(-100%);
  left: unset;
  right: 0;
}

#button[aria-expanded="true"] ~ #listbox {
  display: block;
}

::slotted(*) {
  display: block;
}
</style>

<div id="wrapper">
  <div id="button" aria-haspopup="listbox" aria-expanded="false">
    <slot name="target"></slot>
  </div>
  <div id="listbox" tabindex="-1">
    <div id="listbox-body">
      <slot name="option"></slot>
    </div>
  </div>
</div>
