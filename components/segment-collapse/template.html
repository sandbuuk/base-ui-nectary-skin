<style>
  :host {
    display: block;

    --sinch-global-size-icon: 32px;
  }

  #icon-dropdown {
    display: block;
    will-change: transform;
    transform: rotate(180deg);
  }

  :host([value]:not([value="false"])) #icon-dropdown {
    transform: rotate(0deg);
  }
</style>

<sinch-button id="button" size="s">
  <sinch-icon icons-version="2" name="fa-chevron-down"
    id="icon-dropdown"
    slot="icon"
  ></sinch-icon>
</sinch-button>
