<style>
:host {
  display: contents;

  --sinch-size-icon: 32px;
}

button {
  all: initial;
  position: absolute;
  left: 0;
  top: 0;
  width: 100%;
  height: 100%;
  box-sizing: border-box;
  cursor: pointer;
}

button:focus ~ sinch-icon-expand-less,
button:focus ~ sinch-icon-expand-more {
  border-radius: 4px;
  box-shadow: 0 0 0 1px var(--sinch-color-stormy-500) inset;
}

#up {
  display: block;
}

#down {
  display: none;
}

:host([value]:not([value="false"])) #up {
  display: none;
}

:host([value]:not([value="false"])) #down {
  display: block;
}
</style>

<button></button>
<sinch-icon-expand-less id="up"></sinch-icon-expand-less>
<sinch-icon-expand-more id="down"></sinch-icon-expand-more>
