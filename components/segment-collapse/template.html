<style>
:host {
  display: block;

  --sinch-size-icon: 32px;
}

#up {
  display: block;
}

#down {
  display: none;
}

:host([value]:not([value="false"])) #up {
  display: none;
}

:host([value]:not([value="false"])) #down {
  display: block;
}
</style>

<sinch-icon-button id="button" size="s">
  <sinch-icon-expand-less id="up" slot="icon"></sinch-icon-expand-less>
  <sinch-icon-expand-more id="down" slot="icon"></sinch-icon-expand-more>
</sinch-icon-button>
