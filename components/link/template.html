<style>
:host {
  display: inline;
}

a {
  font: var(--sinch-comp-link-default-font-initial);
  font-size: inherit;
  line-height: inherit;
  text-decoration: var(--sinch-comp-link-default-text-decoration-initial);
  color: var(--sinch-comp-link-color-default-text-initial);
  border-radius: 0.5em;
  white-space: nowrap;

  --sinch-global-color-icon: var(--sinch-comp-link-color-default-icon-initial);
}

a:hover {
  text-decoration: var(--sinch-comp-link-default-text-decoration-hover);
  color: var(--sinch-comp-link-color-default-text-hover);

  --sinch-global-color-icon: var(--sinch-comp-link-color-default-icon-hover);
}

a:focus-visible {
  outline: 2px solid var(--sinch-comp-link-color-default-outline-focus);
  outline-offset: 2px;
}

:host([standalone]) {
  display: block;
}

:host([standalone]) a {
  display: block;
  font: var(--sinch-comp-link-standalone-font-initial);
  font-size: inherit;
  line-height: inherit;
  text-decoration: none;
  width: fit-content;
}

#external-icon,
#standalone-icon {
  display: none;
  height: 1em;
}

#standalone-icon-prefix {
  display: none;
}

:host([external]:not([standalone])) #external-icon {
  display: inline-block;
  margin-right: 0.2em;
  vertical-align: -0.2em;

  --sinch-global-size-icon: 1em;
}

:host([standalone][external]) #external-icon {
  display: inline-block;
  vertical-align: -0.4em;
  margin-right: -0.4em;

  --sinch-global-size-icon: 1.5em;
}

:host([standalone]) #standalone-icon-prefix {
  display: inline;
}

:host([standalone]:not([external])) #standalone-icon {
  display: inline-block;
  vertical-align: -0.4em;

  --sinch-global-size-icon: 1.5em;
}

:host([disabled]) a {
  color: var(--sinch-comp-link-color-disabled-text-initial);
  pointer-events: none;
  cursor: initial;
  text-decoration: var(--sinch-comp-link-default-text-decoration-disabled);

  --sinch-global-color-icon: var(--sinch-comp-link-color-disabled-icon-initial);
}

#content {
  white-space: var(--sinch-global-text-white-space, normal);
}
</style>

<a referrerpolicy="no-referer" aria-hidden="true">
  <sinch-icon id="external-icon" name="open_in_new"></sinch-icon>
  <span id="content"></span>
  <span id="standalone-icon-prefix">&nbsp;</span>
  <sinch-icon id="standalone-icon" name="arrow_forward"></sinch-icon>
</a>
