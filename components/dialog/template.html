<style>
:host {
  display: inline-block;
}

dialog {
  position: fixed;
  left: 0;
  right: 0;
  margin: auto;
  display: flex;
  flex-direction: column;
  padding: 24px;
  max-width: var(--sinch-dialog-max-width, 512px);
  max-height: unset;
  border-radius: var(--sinch-shape-radius-l);
  box-sizing: border-box;
  contain: content;
  background-color: var(--sinch-color-snow-100);
  color: var(--sinch-color-text-default);
  font: var(--sinch-font-body);
  border: none;
  box-shadow: var(--sinch-elevation-level-3);
}

dialog:not([open]) {
  display: none;
}

dialog + .backdrop {
  position: fixed;
  top: 0;
  right: 0;
  bottom: 0;
  left: 0;
  background-color: black;
  opacity: 0.55;
}

dialog::backdrop {
  background-color: black;
  opacity: 0.55;
}

/* stylelint-disable-next-line selector-class-pattern */
._dialog_overlay {
  position: fixed;
  top: 0;
  right: 0;
  bottom: 0;
  left: 0;
}

dialog.fixed {
  position: fixed;
  top: 50%;
  transform: translate(0, -50%);
}

#header {
  display: flex;
  flex-direction: row;
  justify-content: space-between;
  align-items: flex-start;
  margin-bottom: 16px;
}

#caption {
  font: var(--sinch-font-title-m);
  color: var(--sinch-color-text-default);
  white-space: nowrap;
  text-overflow: ellipsis;
  overflow: hidden;
}

#content {
  min-height: 0;
  overflow: auto;
  max-height: var(--sinch-dialog-max-height, 50vh);
}

#buttons {
  display: flex;
  flex-direction: row;
  justify-content: flex-end;
  gap: 16px;
  margin-top: 24px;
}

sinch-icon-button {
  transform: translate(4px, -4px);
}
</style>

<dialog>
  <div id="header">
    <span id="caption"></span>
    <sinch-icon-button id="close" small tabindex="0">
      <sinch-icon-close slot="icon"></sinch-icon-close>
    </sinch-icon-button>
  </div>
  <div id="content">
    <sinch-stop-events events="close">
      <slot name="content"></slot>
    </sinch-stop-events>
  </div>
  <div id="buttons">
    <sinch-stop-events events="close">
      <slot name="buttons"></slot>
    </sinch-stop-events>
  </div>
</dialog>
