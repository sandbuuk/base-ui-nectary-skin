<style>
:host {
  display: contents;
}

#dialog {
  position: fixed;
  left: 0;
  right: 0;
  margin: auto;
  display: flex;
  flex-direction: column;
  padding: 24px 0;
  max-width: var(--sinch-dialog-max-width, 512px);
  max-height: unset;
  border-radius: var(--sinch-shape-radius-l);
  box-sizing: border-box;
  contain: content;
  background-color: var(--sinch-color-snow-100);
  color: var(--sinch-color-text-default);
  font: var(--sinch-font-text-m);
  border: none;
  box-shadow: var(--sinch-elevation-level-3);
}

#dialog:not([open]) {
  display: none;
}

dialog::backdrop {
  background-color: black;
  opacity: 0.55;
}

#header {
  display: flex;
  flex-direction: row;
  justify-content: space-between;
  align-items: flex-start;
  margin-bottom: 12px;
  padding: 0 24px;
}

#caption {
  color: var(--sinch-color-text-default);
}

#content {
  min-height: 0;
  overflow: auto;
  max-height: var(--sinch-dialog-max-height, 50vh);
  padding: 4px 24px;
}

#action {
  display: flex;
  flex-direction: row;
  justify-content: flex-end;
  gap: 16px;
  margin-top: 20px;
  padding: 0 24px;
}

#action.empty {
  display: none;
}

#close {
  transform: translate(4px, -4px);
}
</style>

<dialog id="dialog">
  <div id="header">
    <sinch-title id="caption" type="m" level="3" ellipsis></sinch-title>
    <sinch-icon-button id="close" size="s" tabindex="0">
      <sinch-icon id="icon-close" slot="icon"></sinch-icon>
    </sinch-icon-button>
  </div>
  <div id="content">
    <sinch-stop-events events="close">
      <slot name="content"></slot>
    </sinch-stop-events>
  </div>
  <div id="action">
    <sinch-stop-events events="close">
      <slot name="buttons"></slot>
    </sinch-stop-events>
  </div>
</dialog>
