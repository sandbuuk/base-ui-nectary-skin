<style>
dialog {
  position: absolute;
  left: 0;
  right: 0;
  margin: auto;
  display: flex;
  flex-direction: column;
  padding: 24px;
  width: 100%;
  max-width: 512px;
  border-radius: 4px;
  box-sizing: border-box;
  background-color: var(--sinch-color-snow-100);
  color: var(--sinch-color-text-default);
  font: var(--sinch-font-body);
  border: none;
  box-shadow: 1px 2px 8px rgb(0 0 0 / 10%);
}

dialog:not([open]) {
  display: none;
}

dialog + .backdrop {
  position: fixed;
  top: 0;
  right: 0;
  bottom: 0;
  left: 0;
  background-color: black;
  opacity: 0.55;
}

dialog::backdrop {
  background-color: black;
  opacity: 0.55;
}

/* stylelint-disable-next-line selector-class-pattern */
._dialog_overlay {
  position: fixed;
  top: 0;
  right: 0;
  bottom: 0;
  left: 0;
}

dialog.fixed {
  position: fixed;
  top: 50%;
  transform: translate(0, -50%);
}

#header {
  display: flex;
  flex-direction: row;
  justify-content: space-between;
  align-content: center;
  margin-bottom: 16px;
}

#caption {
  font: var(--sinch-font-title-m);
  color: var(--sinch-color-text-default);
}

#content-wrapper {
  max-height: 50vh;
  overflow-y: auto;
}

#close {
  all: initial;
  cursor: pointer;

  --sinch-size-icon: 24px;
}

#buttons {
  display: flex;
  flex-direction: row;
  justify-content: flex-end;
  gap: 16px;
  margin-top: 24px;
}
</style>

<dialog>
  <div id="header">
    <span id="caption"></span>
    <button id="close">
      <sinch-icon-close></sinch-icon-close>
    </button>
  </div>
  <div id="content-wrapper">
    <slot name="content"></slot>
  </div>
  <div id="buttons">
    <slot name="buttons"></slot>
  </div>
</dialog>
