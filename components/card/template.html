<style>
:host {
  display: block;
  outline: none;
}

#wrapper {
  border-radius: var(--sinch-shape-radius-l);
  border: 1px solid var(--sinch-color-snow-700);
  background-color: var(--sinch-color-snow-100);
  box-shadow: var(--sinch-elevation-level-0);
  overflow: hidden;
}

:host(:hover) #wrapper {
  box-shadow: var(--sinch-elevation-level-1);
}

#card-body {
  padding: 24px;
  box-sizing: border-box;
  display: flex;
  flex-direction: column;
  gap: 16px;
}

#illustration-wrapper {
  display: none;
  overflow: hidden;
  height: 240px;
}

#illustration-wrapper.active {
  display: block;
}

#label {
  color: var(--sinch-color-stormy-300);
}

#label:empty {
  display: none;
}

#header {
  display: flex;
  flex-direction: row;
  align-items: center;
  gap: 8px;

  --sinch-size-icon: 48px;
}

#caption {
  color: var(--sinch-color-stormy-500);
  flex: 1;
  min-width: 0;
}

#description {
  color: var(--sinch-color-stormy-500);
  flex: 1;
  min-height: 0;
  max-height: 120px;
  overflow-y: auto;
}

#description:empty {
  display: none;
}

:host([disabled]:not([disabled="false"])) :is(#illustration-wrapper, #description, #header, #label) {
  opacity: 0.6;
}

slot[name="action"]::slotted(*) {
  margin-top: 20px;
  align-self: flex-start;
  max-width: 100%;
}

:host([draggable="true"]) #header {
  cursor: grab;
}
</style>

<div id="wrapper">
  <div id="illustration-wrapper">
    <slot name="illustration"></slot>
  </div>
  <div id="card-body">
    <sinch-text id="label" type="s" emphasized ellipsis></sinch-text>
    <div id="header">
      <slot name="icon"></slot>
      <sinch-title id="caption" type="m" level="3" ellipsis></sinch-title>
    </div>
    <sinch-text id="description" type="m"></sinch-text>
    <slot name="action"></slot>
  </div>
</div>
