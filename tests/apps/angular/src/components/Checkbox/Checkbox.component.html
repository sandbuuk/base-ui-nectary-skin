<sinch-checkbox
  [attr.name]="name"
  [attr.value]="value"
  [attr.text]="text"
  [attr.disabled]="isDisabled"
  [attr.indeterminate]="isIndeterminate"
  [attr.invalid]="isInvalid"
  [attr.checked]="isChecked"
  (-focus)="onFocus()"
  (-blur)="onBlur()"
  (-change)="onChange($event)">
</sinch-checkbox>
