<sinch-text id="link-wrapper" type="m">
  <span>Line with </span>
  <sinch-link
    preventdefault
    [attr.href]="href"
    [attr.text]="text"
    [attr.disabled]="isDisabled"
    [attr.external]="isExternal"
    [attr.standalone]="isStandalone"
    (-focus)="onFocus()"
    (-blur)="onBlur()"
    (-click)="onClick($event)"
  ></sinch-link>
  <span> navigation</span>
</sinch-text>
