<div id="link-wrapper">
  <span>Line with </span>
  <sinch-link
    [attr.href]="href"
    [attr.text]="text"
    [attr.disabled]="isDisabled"
    [attr.external]="isExternal"
    (-focus)="onFocus()"
    (-blur)="onBlur()"
    (click)="onClick($event)"
  ></sinch-link>
  <span> navigation</span>
</div>
