<sinch-file-picker
  [attr.multiple]="isMultiple"
  [attr.accept]="accept"
  (-change)="onChange($event)"
  (-invalid)="onInvalid($event)"
>
  <sinch-button text="Choose files" type="secondary" aria-label="Choose files">
    <sinch-icon icons-version="2" name="fa-arrow-up-from-line"
      slot="left-icon"
    ></sinch-icon>
  </sinch-button>
</sinch-file-picker>
