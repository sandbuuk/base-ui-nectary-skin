<div *ngIf="isOffsetExample" style="display: flex;">
  <div style="width: 50px; background-color: red;"></div>
  <sinch-popover [attr.open]="isOpen" (-close)="onClose()">
    <sinch-button
      slot="target"
      type="cta-secondary"
      text="Some content"
      aria-label="Button"
      (-click)="onOpen()"
      style="margin: 0 0 20px -20px; position: relative; left: 20px; transform: translate(0, 20px);"
    ></sinch-button>
    <section slot="content" style="max-width: 240px; padding: 12px;">Lorem ipsum dolor sit amet, consectetur adipiscing elit</section>
  </sinch-popover>
  <div style="width: 50px; background-color: red;"></div>
</div>
<sinch-popover
  *ngIf="isSwitchContentExample"
  [attr.open]="isOpen"
  orientation="bottom-right"
  aria-label="Popover"
>
  <div slot="target">
    <sinch-button
      id="open"
      type="cta-secondary"
      text="Open"
      aria-label="Open"
      (-click)="onOpen()">
    </sinch-button>
    <sinch-button
      id="switch-content"
      type="cta-secondary"
      text="Switch"
      aria-label="Switch"
      (-click)="onSwitch()"
    />
  </div>
  <div
    *ngIf="isOtherComponent"
    slot="content"
    style="width: 240px;height: 120px;background-color: red;"
  ></div>
  <div
    *ngIf="!isOtherComponent"
    slot="content"
    style="width: 120px;height: 240px;background-color: green;"
  ></div>
</sinch-popover>
<sinch-popover
  *ngIf="isDefaultExample"
  [attr.open]="isOpen"
  [attr.modal]="isModal"
  [attr.orientation]="orientation"
  (-close)="onClose()">
  <sinch-button
    slot="target"
    type="cta-secondary"
    text="Some content"
    aria-label="Button"
    (-click)="onOpen()">
  </sinch-button>
  <section slot="content" style="max-width: 240px; padding: 12px;">Lorem ipsum dolor sit amet, consectetur adipiscing elit</section>
</sinch-popover>
