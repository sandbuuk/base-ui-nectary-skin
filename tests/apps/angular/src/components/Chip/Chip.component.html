<sinch-chip
  [attr.color]="color"
  [attr.text]="text"
  [attr.small]="isSmall"
  (-click)="onClick()"
  (-focus)="onFocus()"
  (-blur)="onBlur()"
>
<sinch-icon *ngIf="hasIcon" slot="icon" name="sentiment_satisfied"></sinch-icon>
<sinch-icon *ngIf="hasRightIcon" slot="right-icon" name="add"></sinch-icon>
</sinch-chip>
