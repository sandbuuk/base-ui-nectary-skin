<sinch-chip
  [attr.color]="color"
  [attr.text]="text"
  [attr.small]="isSmall"
  [attr.readonly]="isReadonly"
  (-click)="onClick()"
  (-focus)="onFocus()"
  (-blur)="onBlur()"
>
<sinch-icon icons-version="2" name="fa-face-smile" *ngIf="hasIcon" slot="icon"></sinch-icon>
<sinch-icon icons-version="2" name="fa-plus" *ngIf="hasRightIcon" slot="right-icon" name="add"></sinch-icon>
</sinch-chip>
