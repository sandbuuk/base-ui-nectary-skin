<sinch-chip
  [attr.color]="color"
  [attr.text]="text"
  [attr.small]="isSmall"
  (-click)="onClick()"
  (-focus)="onFocus()"
  (-blur)="onBlur()"
>
<sinch-icon-fa-face-smile *ngIf="hasIcon" slot="icon"></sinch-icon-fa-face-smile>
<sinch-icon-fa-plus *ngIf="hasRightIcon" slot="right-icon" name="add"></sinch-icon-fa-plus>
</sinch-chip>
