<div style="position: relative;">
  <sinch-grid>
    <sinch-grid-item slot="item" xl="3" l="4" m="4" s="4">
      <sinch-card-v2 slot="content">
        <sinch-illustration-phone-and-cat
          slot="media"
        ></sinch-illustration-phone-and-cat>
        <sinch-card-v2-title slot="title" text="Card"/>
        <sinch-text slot="content" type="m">{{text}}</sinch-text>
      </sinch-card-v2>
    </sinch-grid-item>
    <sinch-grid-item slot="item" xl="3" l="4" m="4" s="4">
      <sinch-card-v2 slot="content">
        <sinch-card-v2-title slot="title" text="Card">
          <sinch-icon-branded-chatbot slot="icon"></sinch-icon-branded-chatbot>
        </sinch-card-v2-title>
        <sinch-text slot="content" type="m">{{text}}</sinch-text>
      </sinch-card-v2>
    </sinch-grid-item>
    <sinch-grid-item slot="item" xl="3" l="4" m="4" s="2">
      <sinch-card-v2 slot="content">
        <sinch-card-v2-title slot="title" text="Card"/>
        <sinch-text slot="content" type="m">{{text}}</sinch-text>
        <sinch-link
          href="#"
          text="Link"
          slot="footer"
          standalone
          preventdefault
        ></sinch-link>
      </sinch-card-v2>
    </sinch-grid-item>
    <sinch-grid-item slot="item" xl="3" l="4" m="4" s="2">
      <sinch-card-v2 slot="content">
        <sinch-card-v2-title slot="title" text="Card"/>
        <sinch-text slot="content" type="m">{{text}}</sinch-text>
        <sinch-button type="primary" text="Button" slot="footer"></sinch-button>
      </sinch-card-v2>
    </sinch-grid-item>
  </sinch-grid>
  <test-grid-debug></test-grid-debug>
</div>
