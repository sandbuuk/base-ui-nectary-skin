<sinch-action-menu [attr.rows]="rows">
  <sinch-action-menu-option
    *ngFor="let opt of options | keyvalue"
    [value]="opt.key"
    [attr.text]="opt.value.text"
    [attr.disabled]="opt.value.isDisabled"
    (-click)="onClick(opt.key)"
  >
    <sinch-icon icons-version="2" name="fa-arrow-up-right-from-square"
      *ngIf="opt.value.icon === '1'"
      slot="icon"
    ></sinch-icon>
  </sinch-action-menu-option>
</sinch-action-menu>
