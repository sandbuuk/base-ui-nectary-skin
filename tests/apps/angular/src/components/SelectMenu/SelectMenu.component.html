<sinch-select-menu
  [attr.rows]="rows"
  [attr.multiple]="isMultiple"
  [value]="value"
  (-change)="onChange($event)"
>
  <sinch-select-menu-option
    *ngFor="let opt of options | keyvalue"
    [value]="opt.key"
    [attr.text]="opt.value.text"
    [attr.disabled]="opt.value.isDisabled"
  >
    <sinch-icon-fa-arrow-up-right-from-square
      *ngIf="opt.value.icon === '1'"
      slot="icon"
    ></sinch-icon-fa-arrow-up-right-from-square>
  </sinch-select-menu-option>
</sinch-select-menu>
