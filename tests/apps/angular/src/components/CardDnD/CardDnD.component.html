<div
  id="dnd-wrapper"
  style="display: flex; gap: 8px;"
  (dragstart)="onDragStart($event)"
  (dragend)="onDragEnd()"
  (dragover)="onDragOver($event)"
>
  <sinch-card
    *ngFor="let item of items"
    [attr.data-id]="item.key"
    [attr.caption]="item.caption"
    [attr.draggable]="item.draggable"
    text="Lorem ipsum"
    label="Label"
  ></sinch-card>
</div>
