<sinch-inline-alert
  [attr.type]="type"
  [attr.text]="text"
  [attr.caption]="caption"
>
  <sinch-button
    *ngIf="hasClose"
    slot="close"
    size="s"
    (-click)="onCloseClick()"
    (-focus)="onCloseFocus()"
    (-blur)="onCloseBlur()"
  >
    <sinch-icon-fa-xmark slot="icon"></sinch-icon-fa-xmark>
  </sinch-button>
  <sinch-button
    *ngIf="hasAction"
    slot="action"
    type="cta-secondary"
    size="s"
    text="This is a Button!"
    (-click)="onButtonClick()"
    (-focus)="onButtonFocus()"
    (-blur)="onButtonBlur()"
  ></sinch-button>
</sinch-inline-alert>
