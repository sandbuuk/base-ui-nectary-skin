<sinch-button
  [attr.type]="type"
  [attr.text]="text"
  [attr.disabled]="isDisabled"
  [attr.size]="size"
  aria-label="Button"
  (-focus)="onFocus()"
  (-blur)="onBlur()"
  (-click)="onClick()">
  <sinch-spinner *ngIf="hasSpinner" slot="icon"></sinch-spinner>
  <sinch-icon-open-in-new *ngIf="hasLeftIcon" slot="left-icon"></sinch-icon-open-in-new>
  <sinch-icon-expand-more *ngIf="hasIcon" slot="icon"></sinch-icon-expand-more>
</sinch-button>
