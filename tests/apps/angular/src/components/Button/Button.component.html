<sinch-button
  [attr.type]="type"
  [attr.text]="text"
  [attr.disabled]="isDisabled"
  [attr.toggled]="isToggled"
  [attr.size]="size"
  aria-label="Button"
  (-focus)="onFocus()"
  (-blur)="onBlur()"
  (-click)="onClick()"
>
  <sinch-spinner *ngIf="hasSpinner" slot="icon"></sinch-spinner>
  <sinch-icon-fa-arrow-up-right-from-square
    *ngIf="hasIcon"
    slot="icon"
  ></sinch-icon-fa-arrow-up-right-from-square>
  <sinch-icon-fa-angle-down
    *ngIf="hasRightIcon"
    slot="right-icon"
  ></sinch-icon-fa-angle-down>
</sinch-button>
