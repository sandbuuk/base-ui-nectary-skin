<sinch-button
  [attr.type]="type"
  [attr.text]="text"
  [attr.disabled]="isDisabled"
  [attr.small]="isSmall"
  (-focus)="onFocus()"
  (-blur)="onBlur()"
  (-click)="onClick()">
  <sinch-icon-open-in-new *ngIf="hasLeftIcon" slot="left-icon"></sinch-icon-open-in-new>
  <sinch-icon-expand-more *ngIf="hasRightIcon" slot="right-icon"></sinch-icon-expand-more>
  <sinch-spinner *ngIf="hasSpinner" static [attr.type]="isSmall ? 'small' : 'medium'" slot="left-icon"></sinch-spinner>
</sinch-button>
