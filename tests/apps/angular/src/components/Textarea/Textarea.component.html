<sinch-textarea
  [attr.placeholder]="placeholderText"
  [attr.invalid]="isInvalid"
  [attr.disabled]="isDisabled"
  [attr.resizable]="isResizable"
  [attr.rows]="rows"
  [attr.minrows]="minrows"
  (-focus)="onFocus()"
  (-blur)="onBlur()"
  [value]="value"
  (-change)="onChange($event)"
>
  <ng-container *ngIf="hasBottom; then bottom"></ng-container>
  <ng-template #bottom>
    <sinch-button slot="bottom" aria-label="Paperclip">
      <sinch-icon-fa-paperclip-vertical
        slot="icon"
      ></sinch-icon-fa-paperclip-vertical>
    </sinch-button>
    <sinch-button slot="bottom" aria-label="Emoji">
      <sinch-icon-fa-face-laugh slot="icon"></sinch-icon-fa-face-laugh>
    </sinch-button>
    <sinch-button slot="bottom" aria-label="Variables">
      <sinch-icon-fa-magnifying-glass
        slot="icon"
      ></sinch-icon-fa-magnifying-glass>
    </sinch-button>
    <sinch-button slot="bottom" aria-label="Comment">
      <sinch-icon-fa-comment-plus slot="icon"></sinch-icon-fa-comment-plus>
    </sinch-button>
    <sinch-button slot="bottom" aria-label="Comment">
      <sinch-icon-fa-ellipsis slot="icon"></sinch-icon-fa-ellipsis>
    </sinch-button>
    <sinch-tag
      slot="bottom"
      text="400"
      color="success"
      style="margin-left: auto"
    ></sinch-tag>
    <sinch-button slot="bottom" type="primary" aria-label="Send" text="Send">
      <sinch-icon-fa-paper-plane-top
        slot="right-icon"
      ></sinch-icon-fa-paper-plane-top>
    </sinch-button>
  </ng-template>
</sinch-textarea>
