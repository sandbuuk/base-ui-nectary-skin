<sinch-textarea
  [attr.placeholder]="placeholderText"
  [attr.invalid]="isInvalid"
  [attr.disabled]="isDisabled"
  [attr.resizable]="isResizable"
  [attr.rows]="rows"
  [attr.minrows]="minrows"
  (-focus)="onFocus()"
  (-blur)="onBlur()"
  [value]="value"
  (-change)="onChange($event)"
>
  <ng-container *ngIf="hasBottom; then bottom"></ng-container>
  <ng-template #bottom>
    <sinch-button slot="bottom" aria-label="Paperclip">
      <sinch-icon name="fa-paperclip-vertical"
        slot="icon"
      ></sinch-icon>
    </sinch-button>
    <sinch-button slot="bottom" aria-label="Emoji">
      <sinch-icon name="fa-face-laugh" slot="icon"></sinch-icon>
    </sinch-button>
    <sinch-button slot="bottom" aria-label="Variables">
      <sinch-icon name="fa-magnifying-glass"
        slot="icon"
      ></sinch-icon>
    </sinch-button>
    <sinch-button slot="bottom" aria-label="Comment">
      <sinch-icon name="fa-comment-plus" slot="icon"></sinch-icon>
    </sinch-button>
    <sinch-button slot="bottom" aria-label="Comment">
      <sinch-icon name="fa-ellipsis" slot="icon"></sinch-icon>
    </sinch-button>
    <sinch-tag
      slot="bottom"
      text="400"
      color="success"
      style="margin-left: auto;"
    ></sinch-tag>
    <sinch-button slot="bottom" type="primary" aria-label="Send" text="Send">
      <sinch-icon name="fa-paper-plane-top"
        slot="right-icon"
      ></sinch-icon>
    </sinch-button>
  </ng-template>
</sinch-textarea>
