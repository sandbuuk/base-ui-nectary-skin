<sinch-textarea
  [attr.label]="labelText"
  [attr.optionaltext]="optionalText"
  [attr.additionaltext]="additionalText"
  [attr.invalidtext]="invalidText"
  [attr.placeholder]="placeholderText"
  [attr.disabled]="isDisabled"
  [attr.resizable]="isResizable"
  [attr.rows]="rows"
  (-focus)="onFocus()"
  (-blur)="onBlur()"
  [value]="value"
  (-change)="onChange($event)">
  <sinch-help-tooltip *ngIf="tooltipText != null" [text]="tooltipText" slot="tooltip"></sinch-help-tooltip>
</sinch-textarea>
