<sinch-dialog open [attr.caption]="title" (-close)="onClose($event)">
  <section *ngIf="content !== null" slot="content">{{content}}</section>
  <ng-container *ngIf="buttons">
    <sinch-button text="Cancel" type="secondary" slot="buttons"></sinch-button>
    <sinch-button text="Ok" type="primary" slot="buttons"></sinch-button>
  </ng-container>
</sinch-dialog>
