<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
</head>
<body>
  <div id="root">
    <sinch-button type="primary" text="Button"></sinch-button>

    <sinch-input label="Label" placeholder="Placeholder">
      <sinch-help-tooltip text="Tooltip text long long" slot="tooltip"></sinch-help-tooltip>
    </sinch-input>

    <sinch-textarea label="Label" placeholder="Placeholder"></sinch-textarea>

    <sinch-select label="Label" placeholder="Placeholder">
      <sinch-help-tooltip text="Tooltip text long long" slot="tooltip"></sinch-help-tooltip>
      <sinch-select-option value="1" text="Option 1 value" slot="select">
        <sinch-icon-open-in-new slot="icon"></sinch-icon-open-in-new>
      </sinch-select-option>
      <sinch-select-option value="2" text="Option 2 value" slot="select" disabled>
        <sinch-icon-open-in-new slot="icon"></sinch-icon-open-in-new>
      </sinch-select-option>
      <sinch-select-option value="3" text="Option 3 value" slot="select"></sinch-select-option>
      <sinch-select-option value="4" text="Option 4 value" slot="select"></sinch-select-option>
    </sinch-select>

    <sinch-radio value="">
      <sinch-radio-option value="1" text="Option 1"></sinch-radio-option>
      <sinch-radio-option value="2" text="Option 2"></sinch-radio-option>
      <sinch-radio-option value="3" text="Option 3"></sinch-radio-option>
      <sinch-radio-option value="4" text="Option 4"></sinch-radio-option>
    </sinch-radio>
  </div>

  <script>
    document.querySelector('sinch-input').addEventListener('change', (e) => e.target.value = e.detail)
    document.querySelector('sinch-textarea').addEventListener('change', (e) => e.target.value = e.detail)
    document.querySelector('sinch-select').addEventListener('change', (e) => e.target.value = e.detail)
  </script>
</body>
</html>
