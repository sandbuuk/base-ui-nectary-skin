<sinch-tag
  [attr.category]="category"
  [attr.text]="text"
  [attr.inverted]="isInverted"
  [attr.small]="isSmall">
  <sinch-icon-share
    *ngIf="hasIcon"
    slot="icon"
    size="12">
  </sinch-icon-share>
    <sinch-tag-close
    *ngIf="isDismissable"
    slot="close"
    [attr.small]="isSmall"
    (focusin)="onCloseFocus()"
    (focusout)="onCloseBlur()"
    (click)="onCloseClick()">
  </sinch-tag-close>
</sinch-tag>
