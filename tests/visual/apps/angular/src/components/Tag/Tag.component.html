<sinch-tag
  [attr.category]="category"
  [attr.text]="text"
  [attr.inverted]="isInverted"
  [attr.small]="isSmall"
>
  <sinch-icon-share *ngIf="hasIcon" size="12" slot="icon"></sinch-icon-share>
  <sinch-tag-close *ngIf="isDismissable" [attr.small]="isSmall" slot="close"></sinch-tag-close>
</sinch-tag>
