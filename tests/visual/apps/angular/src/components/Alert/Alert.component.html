<sinch-alert
  [attr.type]="type"
  [attr.text]="text"
  [attr.title]="title"
  [attr.multiline]="isMultiline || null">
  <sinch-alert-close *ngIf="isDismissable" slot="close"></sinch-alert-close>
  <sinch-alert-button *ngIf="actionText != null" slot="button" [attr.text]="actionText"></sinch-alert-button>
</sinch-alert>
