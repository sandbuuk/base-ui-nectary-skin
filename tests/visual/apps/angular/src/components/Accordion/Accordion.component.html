<sinch-accordion [value]="value" (change)="onChange($event)" [attr.multiple]="isMultiple">
  <sinch-accordion-item *ngFor="let opt of options"
    [attr.value]="opt.value"
    [attr.label]="opt.label"
    [attr.disabled]="opt.disabled"
    [attr.status]="opt.status">
    <span *ngIf="opt.content != null">{{opt.content}}</span>
    <sinch-icon-share *ngIf="opt.icon === true" slot="icon"></sinch-icon-share>
  </sinch-accordion-item>
</sinch-accordion>
