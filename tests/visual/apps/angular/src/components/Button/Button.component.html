<sinch-button
  [attr.type]="type"
  [attr.text]="text"
  [attr.disabled]="isDisabled"
  [attr.small]="isSmall"
  (focusin)="onFocus()"
  (focusout)="onBlur()"
  (click)="onClick()">
  <sinch-icon-open-in-new *ngIf="hasIcon" [attr.size]="isSmall ? '16' : '24'" slot="icon"></sinch-icon-open-in-new>
  <sinch-spinner *ngIf="hasSpinner" static [attr.type]="isSmall ? 'small' : 'medium'" slot="icon"></sinch-spinner>
</sinch-button>
