<sinch-button
  [attr.type]="type"
  [attr.text]="text"
  [attr.disabled]="isDisabled"
  [attr.small]="isSmall">
  <sinch-icon-share *ngIf="hasIcon" [attr.size]="isSmall ? 12 : 18"></sinch-icon-share>
  <sinch-spinner *ngIf="hasSpinner" static [attr.type]="isSmall ? 'small' : 'medium'"></sinch-spinner>
</sinch-button>
