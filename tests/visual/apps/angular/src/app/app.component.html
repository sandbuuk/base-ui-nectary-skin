<div [ngStyle]="style" [ngSwitch]="pathname">
  <alert-component *ngSwitchCase="'/alert'"></alert-component>
  <button-component *ngSwitchCase="'/button'"></button-component>
  <checkbox-component *ngSwitchCase="'/checkbox'"></checkbox-component>
  <input-component *ngSwitchCase="'/input'"></input-component>
  <radio-component *ngSwitchCase="'/radio'"></radio-component>
  <select-component *ngSwitchCase="'/select'"></select-component>
</div>
