variables:
  GIT_DEPTH: 1

include:
  - project: "sinch/sinch-projects/sinch-platform/infra/pipeline/security"
    ref: v1-latest
    file: "auto_security.yml"

sinch_global_security_stage_secret_detection_gitleaks:
  extends: .sinch_global_security_stage_secret_detection_gitleaks
  before_script: []
  rules:
    - if: "$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH"
      allow_failure: true

sinch_global_security_stage_dependency_scanning_dependency_check:
  extends: .sinch_global_security_stage_dependency_scanning_dependency_check
  before_script: []
  rules:
    - if: "$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH"
      allow_failure: true

consolidate_third_party_security_reports:
  extends: .consolidate_third_party_security_reports
  before_script: []
  rules:
    - if: "$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH"
      allow_failure: true

sinch_global_security_stage_sast_sonarqube:
  extends: .sinch_global_security_stage_sast_sonarqube
  before_script: []
  tags: []
  rules:
    - if: "$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH"
      allow_failure: true

default:
  image: node:20
  tags:
    - saas
    - application

stages:
  - lint
  - test
  - build
  - security-scan-third-parties
  - security-scan-consolidation
  - security-scan-sonar
  - deploy

.prepare-ci:
  before_script:
    - echo -e "\e[0Ksection_start:`date +%s`:job_env_output[collapsed=true]\r\e[0KJob Environment output"
    - pwd
    - env
    - echo -e "\e[0Ksection_end:`date +%s`:job_env_output\r\e[0K"
    - ./scripts/ci-install-packages.sh

.cache:
  cache:
    key:
      files:
        - pnpm-lock.yaml
      prefix: cache
    paths:
      - .pnpm-store

lint:
  extends:
    - .cache
    - .prepare-ci
  stage: lint
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
  variables:
    GIT_LFS_SKIP_SMUDGE: 1
  script:
    - pnpm --dir components build
    - pnpm --dir assets build
    - pnpm lint

visual-tests:
  variables:
    KUBERNETES_CPU_REQUEST: "1"
    KUBERNETES_CPU_LIMIT: "2"
    KUBERNETES_MEMORY_REQUEST: "2Gi"
    KUBERNETES_MEMORY_LIMIT: "4Gi"
  stage: test
  image: mcr.microsoft.com/playwright:v1.33.0
  extends:
    - .cache
    - .prepare-ci
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
  parallel:
    matrix:
      - BROWSER_FRAMEWORK: chromium-react
        SHARD: [1, 2, 3]
      - BROWSER_FRAMEWORK: firefox-vue
        SHARD: [1, 2, 3]
      - BROWSER_FRAMEWORK: webkit-angular
        SHARD: [1, 2, 3]
  script:
    - pnpm --dir components build
    - pnpm --dir assets build
    - pnpm --dir tests test:ci-$BROWSER_FRAMEWORK --shard=$SHARD/3
  artifacts:
    when: on_failure
    paths:
      - tests/test-results

.publish-base:
  extends:
    - .cache
    - .prepare-ci
  stage: deploy
  variables:
    # token for "semantic-release" to be able to push the tags.
    GITLAB_TOKEN: $CI_GIT_PUSH_TOKEN
    NPM_TOKEN: $NPM_TOKEN

publish-dry-run:
  extends:
    - .publish-base
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH	 == $CI_DEFAULT_BRANCH
    - when: never
  script:
    - pnpm -r --filter='!docs*' run build
    - pnpm run dry-run

publish:
  extends:
    - .publish-base
  needs:
    - publish-dry-run
  rules:
    - if: $CI_COMMIT_BRANCH	 == $CI_DEFAULT_BRANCH
    - when: never
  script:
    - pnpm -r --filter='!docs*' run build
    - apt-get update -y
    - apt-get install -y git git-lfs
    - git lfs install
    - pnpm run release

build-docs:
  stage: build
  extends:
    - .cache
    - .prepare-ci
  rules:
    - if: $CI_COMMIT_TAG =~ /^components@/
    - if: $CI_COMMIT_TAG == "docs"
  variables:
    GIT_LFS_SKIP_SMUDGE: 1
  before_script:
    - ./scripts/ci-install-packages.sh
    - rm -rf .git/hooks/
  script:
    - git config --global user.email ci@sinch.com
    - git config --global user.name Bot
    - git fetch origin refs/heads/docs
    - git checkout origin/docs -- public
    - pnpm --dir components build
    - pnpm --dir assets build
    - VERSION=$(npm view @nectary/components version)
    - ./scripts/generate-docs.sh $VERSION
    - git branch -D docs || true
    - git checkout --orphan docs
    - git reset
    - git add -f public
    - git commit -m "build docs"
    - git push --force "https://gitlab-ci-token:$PROJECT_ACCESS_TOKEN@$CI_SERVER_HOST/$CI_PROJECT_PATH.git"
  artifacts:
    paths:
      - public

publish-docs:
  stage: deploy
  image: 652860480992.dkr.ecr.eu-west-1.amazonaws.com/aws-cli-runner
  needs:
    - build-docs
  rules:
    - if: $CI_COMMIT_TAG =~ /^components@/
    - if: $CI_COMMIT_TAG == "docs"
  variables:
    GIT_LFS_SKIP_SMUDGE: 1
  script:
    - appcli use production
    - aws s3 rm s3://${BUCKET_ID}/.public/ --recursive --exclude ""
    - aws s3 cp public/ s3://${BUCKET_ID}/.public/ --recursive --include "*"
    - aws cloudfront create-invalidation --distribution-id ${DISTRIBUTION_ID} --paths "/*"

pages:
  stage: deploy
  rules:
    - if: $CI_COMMIT_TAG == "preview"
  extends: .prepare-ci
  cache:
    key:
      files:
        - pnpm-lock.yaml
      prefix: cache
    paths:
      - .pnpm-store
  variables:
    GIT_LFS_SKIP_SMUDGE: 1
  before_script:
    - ./scripts/ci-install-packages.sh
    - pnpm --dir components build
    - pnpm --dir assets build
  script:
    - VERSION=$(npm view @nectary/components version)
    - ./scripts/generate-docs.sh $VERSION
  artifacts:
    paths:
      - public
