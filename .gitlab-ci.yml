publish-components:
  stage: deploy
  rules:
    - if: $CI_COMMIT_TAG =~ /^components@/
  image: node:16
  cache:
    key:
      files:
        - pnpm-lock.yaml
      prefix: cache
    paths:
      - .pnpm-store
    policy: pull
  variables:
    GIT_LFS_SKIP_SMUDGE: 1
  before_script:
    - set AWS_WEB_IDENTITY_TOKEN_FILE /var/run/secrets/eks.amazonaws.com/serviceaccount/token
    - npm install --global pnpm
    - pnpm config set store-dir .pnpm-store
    - pnpm install --frozen-lockfile --reporter append-only
  script:
    - pnpm --dir components build
    - echo "//registry.npmjs.org/:_authToken=${NPM_TOKEN}" > .npmrc
    - npm publish components/
    - node ./scripts/slack-changelog.js

pages:
  stage: deploy
  image: node:16
  rules:
    - if: $CI_COMMIT_TAG =~ /^components@/
    - if: $CI_COMMIT_TAG =~ /^storybook$/
  cache:
    key:
      files:
        - pnpm-lock.yaml
      prefix: cache
    paths:
      - .pnpm-store
    policy: pull
  variables:
    GIT_LFS_SKIP_SMUDGE: 1
  before_script:
    - set AWS_WEB_IDENTITY_TOKEN_FILE /var/run/secrets/eks.amazonaws.com/serviceaccount/token
    - npm install --global pnpm
    - pnpm config set store-dir .pnpm-store
    - pnpm install --frozen-lockfile --reporter append-only
    - rm -rf .git/hooks/
  script:
    - pnpm storybook:build
    - git config --global user.email ci@sinch.com
    - git config --global user.name Bot
    - git checkout --orphan storybook
    - git reset
    - git add -f public
    - git commit -m "build storybook"
    - git push --force "https://gitlab-ci-token:$PROJECT_ACCESS_TOKEN@$CI_SERVER_HOST/$CI_PROJECT_PATH.git"
  artifacts:
    paths:
      - public
