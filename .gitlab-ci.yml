stages:
  - lint
  - test
  - build
  - deploy

lint:
  image: node:16
  stage: lint
  except:
    - tags
  cache:
    key:
      files:
        - yarn.lock
      prefix: cache
    paths:
      - .yarn/
  variables:
    GIT_LFS_SKIP_SMUDGE: 1
  before_script:
    - yarn install --cache-folder $PWD/.yarn --frozen-lockfile
  script:
    - yarn lint

visual-tests:
  stage: test
  image: mcr.microsoft.com/playwright:v1.17.1
  except:
    - tags
  cache:
    key:
      files:
        - yarn.lock
      prefix: cache
    paths:
      - .yarn/
    policy: pull
  before_script:
    - yarn install --cache-folder $PWD/.yarn --frozen-lockfile
  script:
    - yarn --cwd=tests/visual test:ci
  after_script:
    - find ./tests/visual/test-results -type d -empty -delete
  artifacts:
    when: on_failure
    paths:
      - tests/visual/test-results

accessibility-tests:
  stage: test
  image: mcr.microsoft.com/playwright:v1.17.1
  except:
    - tags
  cache:
    key:
      files:
        - yarn.lock
      prefix: cache
    paths:
      - .yarn/
    policy: pull
  variables:
    GIT_LFS_SKIP_SMUDGE: 1
  before_script:
    - yarn install --cache-folder $PWD/.yarn --frozen-lockfile
  script:
    - yarn --cwd=tests/accessibility test:ci

build-shell:
  stage: build
  rules:
    - if: $CI_COMMIT_TAG =~ /^shell@/
  image: node:16
  cache:
    key:
      files:
        - yarn.lock
      prefix: cache
    paths:
      - .yarn/
    policy: pull
  variables:
    GIT_LFS_SKIP_SMUDGE: 1
  before_script:
    - yarn install --cache-folder $PWD/.yarn --frozen-lockfile
  script:
    - yarn build:shell --output-path ../../dist/
  artifacts:
    paths:
      - dist/

build-quickstarts:
  stage: build
  rules:
    - if: $CI_COMMIT_TAG =~ /^quickstarts@/
  image: node:16
  cache:
    key:
      files:
        - yarn.lock
      prefix: cache
    paths:
      - .yarn/
    policy: pull
  variables:
    GIT_LFS_SKIP_SMUDGE: 1
  before_script:
    - yarn install --cache-folder $PWD/.yarn --frozen-lockfile
  script:
    - yarn build:quickstarts --output-path ../../dist/
  artifacts:
    paths:
      - dist/

deploy-shell:
  stage: deploy
  rules:
    - if: $CI_COMMIT_TAG =~ /^shell@/
  image: registry.gitlab.com/gitlab-org/cloud-deploy/aws-base:latest
  dependencies:
    - build-shell
  needs:
    - build-shell
  variables:
    GIT_LFS_SKIP_SMUDGE: 1
  script:
  - aws s3 cp ./dist/ s3://sinch-engage-shell-lab/ --recursive --include "*"
  - aws cloudfront create-invalidation --distribution-id E1FUUKU2OB9PYS --paths "/*"

deploy-quickstarts:
  stage: deploy
  rules:
    - if: $CI_COMMIT_TAG =~ /^quickstarts@/
  image: registry.gitlab.com/gitlab-org/cloud-deploy/aws-base:latest
  dependencies:
    - build-quickstarts
  needs:
    - build-quickstarts
  variables:
    GIT_LFS_SKIP_SMUDGE: 1
  script:
  - aws s3 cp ./dist/ s3://sinch-engage-quickstarts-lab/ --recursive --include "*"
  - aws cloudfront create-invalidation --distribution-id E2DT4M7D8AY1QW --paths "/*"

publish-components:
  stage: deploy
  rules:
    - if: $CI_COMMIT_TAG =~ /^components@/
  image: node:16
  cache:
    key:
      files:
        - yarn.lock
      prefix: cache
    paths:
      - .yarn/
    policy: pull
  variables:
    GIT_LFS_SKIP_SMUDGE: 1
  before_script:
    - yarn install --cache-folder $PWD/.yarn --frozen-lockfile
  script:
    - pushd components
    - yarn build
    - echo "//registry.npmjs.org/:_authToken=${NPM_TOKEN}" > .npmrc
    - echo "scope=sinch-engage" >> .npmrc
    - echo "@sinch-engage:registry=https://registry.npmjs.org" >> .npmrc
    - npm publish
    - popd
    - node ./scripts/slack-changelog.js

publish-bus:
  stage: deploy
  rules:
    - if: $CI_COMMIT_TAG =~ /^bus@/
  image: node:16
  cache:
    key:
      files:
        - yarn.lock
      prefix: cache
    paths:
      - .yarn/
    policy: pull
  variables:
    GIT_LFS_SKIP_SMUDGE: 1
  before_script:
    - yarn install --cache-folder $PWD/.yarn --frozen-lockfile
  script:
    - yarn --cwd libs/bus/ build
    - node scripts/prepare-package-json.js libs/bus/package.json
    - echo "//nexus.int.clxnetworks.net/repository/sinch_npm/:_authToken=${NPM_TOKEN}" > .npmrc
    - npm publish libs/bus/

pages:
  stage: deploy
  image: node:16
  rules:
    - if: $CI_COMMIT_TAG =~ /^components@/
  cache:
    key:
      files:
        - yarn.lock
      prefix: cache
    paths:
      - .yarn/
    policy: pull
  variables:
    GIT_LFS_SKIP_SMUDGE: 1
  before_script:
    - yarn install --cache-folder $PWD/.yarn --frozen-lockfile
    - rm -rf .git/hooks/
  script:
    - yarn storybook:build
    - git config --global user.email ci@sinch.com
    - git config --global user.name Bot
    - git checkout --orphan storybook
    - git reset
    - git add -f public
    - git commit -m "build storybook"
    - git push --force "https://gitlab-ci-token:$PROJECT_ACCESS_TOKEN@$CI_SERVER_HOST/$CI_PROJECT_PATH.git"
  artifacts:
    paths:
      - public
