default:
  tags:
    - staging
#    - application
#    - saas

stages:
  - lint
  - test
  - build
  - deploy

lint:
  image: node:16
  stage: lint
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
  cache:
    key:
      files:
        - pnpm-lock.yaml
      prefix: cache
    paths:
      - .pnpm-store
  variables:
    GIT_LFS_SKIP_SMUDGE: 1
  before_script:
    - set AWS_WEB_IDENTITY_TOKEN_FILE /var/run/secrets/eks.amazonaws.com/serviceaccount/token
    - npm install --no-audit --no-fund --global pnpm
    - pnpm config set store-dir .pnpm-store
    - pnpm install
  script:
    - pnpm lint

visual-tests:
  stage: test
  image: mcr.microsoft.com/playwright:v1.22.2
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
  cache:
    key:
      files:
        - pnpm-lock.yaml
      prefix: cache
    paths:
      - .pnpm-store
    policy: pull
  parallel:
    matrix:
      - BROWSER:
          - chromium
          - firefox
          - webkit
        FRAMEWORK:
          - react
          - vue
          - angular
  before_script:
    - set AWS_WEB_IDENTITY_TOKEN_FILE /var/run/secrets/eks.amazonaws.com/serviceaccount/token
    - npm install --no-audit --no-fund --global pnpm
    - pnpm config set store-dir .pnpm-store
    - pnpm install --frozen-lockfile
  script:
    - pnpm --dir tests test:ci-$BROWSER-$FRAMEWORK
  artifacts:
    when: on_failure
    paths:
      - tests/test-results

publish-components:
  stage: deploy
  rules:
    - if: $CI_COMMIT_TAG =~ /^components@/ && $CI_COMMIT_BRANCH == "main"
  image: node:16
  cache:
    key:
      files:
        - pnpm-lock.yaml
      prefix: cache
    paths:
      - .pnpm-store
    policy: pull
  variables:
    GIT_LFS_SKIP_SMUDGE: 1
  before_script:
    - set AWS_WEB_IDENTITY_TOKEN_FILE /var/run/secrets/eks.amazonaws.com/serviceaccount/token
    - npm install --no-audit --no-fund --global pnpm
    - pnpm config set store-dir .pnpm-store
    - pnpm install --frozen-lockfile
  script:
    - pnpm --dir components build
    - echo "//registry.npmjs.org/:_authToken=${NPM_TOKEN}" > .npmrc
    - npm publish components/
    - node ./scripts/slack-changelog.js

pages:
  stage: deploy
  image: node:16
  rules:
    - if: $CI_COMMIT_TAG =~ /^components@/ && $CI_COMMIT_BRANCH == "main"
    - if: $CI_COMMIT_TAG == "storybook" && $CI_COMMIT_BRANCH == "main"
  cache:
    key:
      files:
        - pnpm-lock.yaml
      prefix: cache
    paths:
      - .pnpm-store
    policy: pull
  variables:
    GIT_LFS_SKIP_SMUDGE: 1
  before_script:
    - set AWS_WEB_IDENTITY_TOKEN_FILE /var/run/secrets/eks.amazonaws.com/serviceaccount/token
    - npm install --no-audit --no-fund --global pnpm
    - pnpm config set store-dir .pnpm-store
    - pnpm install --frozen-lockfile
    - rm -rf .git/hooks/
  script:
    - pnpm storybook:build
    - git config --global user.email ci@sinch.com
    - git config --global user.name Bot
    - git checkout --orphan storybook
    - git reset
    - git add -f public
    - git commit -m "build storybook"
    - git push --force "https://gitlab-ci-token:$PROJECT_ACCESS_TOKEN@$CI_SERVER_HOST/$CI_PROJECT_PATH.git"
  artifacts:
    paths:
      - public
