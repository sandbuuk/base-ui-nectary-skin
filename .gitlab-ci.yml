variables:
  GIT_DEPTH: 1

default:
  tags:
    - saas-default-role

stages:
  - lint
  - test
  - build
  - deploy

lint:
  image: node:16
  stage: lint
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
  cache:
    key:
      files:
        - pnpm-lock.yaml
      prefix: cache
    paths:
      - .pnpm-store
  variables:
    GIT_LFS_SKIP_SMUDGE: 1
  before_script:
    - npm install --no-audit --no-fund --global pnpm
    - pnpm config set store-dir .pnpm-store
    - pnpm install --frozen-lockfile
  script:
    - pnpm lint

visual-tests:
  stage: test
  image: mcr.microsoft.com/playwright:v1.29.2
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
  cache:
    key:
      files:
        - pnpm-lock.yaml
      prefix: cache
    paths:
      - .pnpm-store
    policy: pull
  parallel:
    matrix:
      - BROWSER_FRAMEWORK:
          - chromium-react
          - firefox-vue
          - webkit-angular
  before_script:
    - npm install --no-audit --no-fund --global pnpm
    - pnpm config set store-dir .pnpm-store
    - pnpm install --frozen-lockfile --offline --reporter silent
  script:
    - pnpm --dir tests test:ci-$BROWSER_FRAMEWORK
  artifacts:
    when: on_failure
    paths:
      - tests/test-results

publish-components:
  stage: deploy
  needs:
    - pages
  rules:
    - if: $CI_COMMIT_TAG =~ /^components@/
  image: node:16
  cache:
    key:
      files:
        - pnpm-lock.yaml
      prefix: cache
    paths:
      - .pnpm-store
    policy: pull
  variables:
    GIT_LFS_SKIP_SMUDGE: 1
  before_script:
    - set AWS_WEB_IDENTITY_TOKEN_FILE /var/run/secrets/eks.amazonaws.com/serviceaccount/token
    - npm install --no-audit --no-fund --global pnpm
    - pnpm config set store-dir .pnpm-store
    - pnpm install --frozen-lockfile --offline --reporter silent
  script:
    - pnpm --dir components build
    - echo "//registry.npmjs.org/:_authToken=${NPM_TOKEN}" > .npmrc
    - npm publish components/
    - node ./scripts/slack-changelog.js components

publish-assets:
  stage: deploy
  rules:
    - if: $CI_COMMIT_TAG =~ /^assets@/
  image: node:16
  cache:
    key:
      files:
        - pnpm-lock.yaml
      prefix: cache
    paths:
      - .pnpm-store
    policy: pull
  variables:
    GIT_LFS_SKIP_SMUDGE: 1
  before_script:
    - set AWS_WEB_IDENTITY_TOKEN_FILE /var/run/secrets/eks.amazonaws.com/serviceaccount/token
    - npm install --no-audit --no-fund --global pnpm
    - pnpm config set store-dir .pnpm-store
    - pnpm install --frozen-lockfile --offline --reporter silent
  script:
    - pnpm --dir assets build
    - echo "//registry.npmjs.org/:_authToken=${NPM_TOKEN}" > .npmrc
    - npm publish assets/
    - node ./scripts/slack-changelog.js assets

publish-theme-base:
  stage: deploy
  rules:
    - if: $CI_COMMIT_TAG =~ /^theme-base@/
  image: node:16
  variables:
    GIT_LFS_SKIP_SMUDGE: 1
  before_script:
    - set AWS_WEB_IDENTITY_TOKEN_FILE /var/run/secrets/eks.amazonaws.com/serviceaccount/token
  script:
    - echo "//registry.npmjs.org/:_authToken=${NPM_TOKEN}" > .npmrc
    - npm publish themes/base
    - node ./scripts/slack-changelog.js theme-base

publish-theme-dark:
  stage: deploy
  rules:
    - if: $CI_COMMIT_TAG =~ /^theme-dark@/
  image: node:16
  variables:
    GIT_LFS_SKIP_SMUDGE: 1
  before_script:
    - set AWS_WEB_IDENTITY_TOKEN_FILE /var/run/secrets/eks.amazonaws.com/serviceaccount/token
  script:
    - echo "//registry.npmjs.org/:_authToken=${NPM_TOKEN}" > .npmrc
    - npm publish themes/dark
    - node ./scripts/slack-changelog.js theme-dark

pages:
  stage: deploy
  image: node:16
  rules:
    - if: $CI_COMMIT_TAG =~ /^components@/
    - if: $CI_COMMIT_TAG == "pages"
  cache:
    key:
      files:
        - pnpm-lock.yaml
      prefix: cache
    paths:
      - .pnpm-store
  variables:
    GIT_LFS_SKIP_SMUDGE: 1
  before_script:
    - set AWS_WEB_IDENTITY_TOKEN_FILE /var/run/secrets/eks.amazonaws.com/serviceaccount/token
    - npm install --no-audit --no-fund --global pnpm
    - pnpm config set store-dir .pnpm-store
    - pnpm install --frozen-lockfile
    - rm -rf .git/hooks/
  script:
    - git config --global user.email ci@sinch.com
    - git config --global user.name Bot
    - git fetch origin refs/heads/storybook
    - git checkout origin/storybook -- public
    - ./scripts/generate-docs.sh
    - git branch -D storybook || true
    - git checkout --orphan storybook
    - git reset
    - git add -f public
    - git commit -m "build pages"
    - git push --force "https://gitlab-ci-token:$PROJECT_ACCESS_TOKEN@$CI_SERVER_HOST/$CI_PROJECT_PATH.git"
  artifacts:
    paths:
      - public
