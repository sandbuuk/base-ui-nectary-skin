default:
  tags:
    - application
    - saas

stages:
  - lint
  - test
  - build
  - deploy

lint:
  image: node:16
  stage: lint
  except:
    - tags
  cache:
    key:
      files:
        - pnpm-lock.yaml
      prefix: cache
    paths:
      - .pnpm-store
  variables:
    GIT_LFS_SKIP_SMUDGE: 1
  before_script:
    - set AWS_WEB_IDENTITY_TOKEN_FILE /var/run/secrets/eks.amazonaws.com/serviceaccount/token
    - npm install --global pnpm
    - pnpm config set store-dir .pnpm-store
    - pnpm install --reporter append-only
  script:
    - pnpm lint

visual-tests-chromium:
  stage: test
  image: mcr.microsoft.com/playwright:v1.22.2
  except:
    - tags
  cache:
    key:
      files:
        - pnpm-lock.yaml
      prefix: cache
    paths:
      - .pnpm-store
    policy: pull
  before_script:
    - set AWS_WEB_IDENTITY_TOKEN_FILE /var/run/secrets/eks.amazonaws.com/serviceaccount/token
    - npm install --global pnpm
    - pnpm config set store-dir .pnpm-store
    - pnpm install --frozen-lockfile --reporter append-only
  script:
    - pnpm --dir tests test:ci-chromium
  after_script:
    - find ./tests/test-results -type d -empty -delete
  artifacts:
    when: on_failure
    paths:
      - tests/test-results

