variables:
  GIT_DEPTH: 1

include:
  - project: "sinch/sinch-projects/sinch-platform/infra/pipeline/security"
    ref: v1-latest
    file: "auto_security.yml"
  - project: "sinch/sinch-projects/applications/teams/core/core"
    ref: main
    file: "/_pipeline-templates/mr-notifications.yml"
  - local: .gitlab/deploy-global-components.yml

sinch_global_security_stage_secret_detection_gitleaks:
  extends: .sinch_global_security_stage_secret_detection_gitleaks
  before_script: []
  rules:
    - if: "$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH"
      allow_failure: true

sinch_global_security_stage_dependency_scanning_dependency_check:
  extends: .sinch_global_security_stage_dependency_scanning_dependency_check
  before_script: []
  rules:
    - if: "$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH"
      allow_failure: true

consolidate_third_party_security_reports:
  extends: .consolidate_third_party_security_reports
  before_script: []
  rules:
    - if: "$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH"
      allow_failure: true

sinch_global_security_stage_sast_sonarqube:
  extends: .sinch_global_security_stage_sast_sonarqube
  before_script: []
  rules:
    - if: "$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH"
      allow_failure: true

default:
  image: node:20
  tags:
    - general
    - saas
    - stg
    - eu-west-1
    - k8s
    - arm64

stages:
  - start
  - lint
  - test
  - build
  - security-scan-third-parties
  - security-scan-consolidation
  - security-scan-sonar
  - deploy
  - docs

.aws-authenticate-classic-engage-nectary:
  id_tokens:
    GITLAB_OIDC_TOKEN:
      aud: https://gitlab.com
  variables:
    AWS_ROLE_ARN: arn:aws:iam::767006020294:role/nectary-components-ci-access
    AWS_WEB_IDENTITY_TOKEN_FILE: $RUNNER_TEMP_PROJECT_DIR/aws-web-identity-token-file
    AWS_ROLE_SESSION_NAME: "GitLabRunner-${CI_PROJECT_ID}-${CI_PIPELINE_ID}"
  before_script: &authenticate_aws
    - echo $GITLAB_OIDC_TOKEN > $AWS_WEB_IDENTITY_TOKEN_FILE

.prepare-ci:
  before_script:
    - echo -e "\e[0Ksection_start:`date +%s`:job_env_output[collapsed=true]\r\e[0KJob Environment output"
    - pwd
    - env
    - echo -e "\e[0Ksection_end:`date +%s`:job_env_output\r\e[0K"
    - ./scripts/ci-install-packages.sh
    - export NODE_OPTIONS="--max-old-space-size=4096"

.cache:
  cache:
    key:
      files:
        - pnpm-lock.yaml
      prefix: cache
    paths:
      - .pnpm-store

notify-on-mr-created:
  extends: .notify-on-mr-created-template
  stage: start

terraform:
  stage: start
  trigger:
    include: .gitlab/terraform-ci.yml
    strategy: depend
  rules:
    - if: $CI_MERGE_REQUEST_ID || $CI_COMMIT_REF_NAME == $CI_DEFAULT_BRANCH
      changes:
        paths:
          - terraform/**/*
    - if: $CI_MERGE_REQUEST_ID || $CI_COMMIT_REF_NAME == $CI_DEFAULT_BRANCH
      when: manual
      allow_failure: true

lint:
  extends:
    - .cache
    - .prepare-ci
  stage: lint
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
  variables:
    GIT_LFS_SKIP_SMUDGE: 1
  script:
    - pnpm lint

unit-tests:
  extends:
    - .cache
    - .prepare-ci
  stage: test
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
      changes:
        - components/**/*
        - assets/**/*
        - tests/unit/**/*
        - tests/tsconfig.json
        - tests/playwright.config.ts
  variables:
    GIT_LFS_SKIP_SMUDGE: 1
  script:
    - pnpm --dir tests test:unit
  artifacts:
    when: on_failure
    reports:
      junit: tests/test-results/unit-results.xml
    paths:
      - tests/test-results

visual-tests:
  variables:
    KUBERNETES_CPU_REQUEST: "1"
    KUBERNETES_CPU_LIMIT: "2"
    KUBERNETES_MEMORY_REQUEST: "2Gi"
    KUBERNETES_MEMORY_LIMIT: "4Gi"
  stage: test
  image: mcr.microsoft.com/playwright:v1.33.0
  extends:
    - .cache
    - .prepare-ci
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
      changes:
        - tests/**/*
        - themes/**/*
        - assets/**/*
        - components/**/*
        - fonts/**/*
  parallel:
    matrix:
      - BROWSER_FRAMEWORK: chromium-react
        SHARD: [1, 2, 3]
      - BROWSER_FRAMEWORK: firefox-vue
        SHARD: [1, 2, 3]
      - BROWSER_FRAMEWORK: webkit-angular
        SHARD: [1, 2, 3]
  script:
    - pnpm --dir tests test:ci-$BROWSER_FRAMEWORK --shard=$SHARD/3
  artifacts:
    when: on_failure
    paths:
      - tests/test-results

.publish-base:
  extends:
    - .cache
    - .prepare-ci
  stage: deploy
  variables:
    # token for "semantic-release" to be able to push the tags.
    GITLAB_TOKEN: $CI_GIT_PUSH_TOKEN
    NPM_TOKEN: $NPM_TOKEN

publish-dry-run:
  extends:
    - .publish-base
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
    - when: never
  script:
    - pnpm -r --filter='!docs*' --filter='!wrappers*' run build
    - pnpm run dry-run

publish:
  extends:
    - .publish-base
  needs:
    - publish-dry-run
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
    - when: never
  script:
    - pnpm -r --filter='!docs*' --filter='!wrappers*' run build
    - apt-get update -y
    - apt-get install -y git git-lfs
    - git lfs update --force
    - git lfs install
    - MSR_OUT="$(pnpm run release 2>&1)"; MSR_STATUS=$?; echo "$MSR_OUT"; [ $MSR_STATUS -eq 0 ] || exit $MSR_STATUS
    - echo "$MSR_OUT" | sed -nE 's/.*\[([^]]+)\].*Published release ([^ ]+).*/\1 \2/p' > published.txt
  artifacts:
    when: always
    paths:
      - published.txt
      - components
      - assets

preview:
  stage: docs
  extends:
    - .prepare-ci
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
      when: manual
      allow_failure: true
  variables:
    GIT_LFS_SKIP_SMUDGE: 1
  before_script:
    - ./scripts/ci-install-packages.sh
  script:
    - VERSION=$(npm view @nectary/components version)
    - ./scripts/generate-docs.sh $VERSION
  pages: true
  artifacts:
    paths:
      - public
    expire_in: 1 week

build-docs:
  stage: build
  extends:
    - .cache
    - .prepare-ci
  rules:
    - if: $CI_COMMIT_TAG =~ /^@nectary/
    - if: $CI_COMMIT_TAG == "docs"
      when: always
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
      changes:
        paths:
          - docs/**/*
      when: on_success
  variables:
    GIT_LFS_SKIP_SMUDGE: 1
  before_script:
    - ./scripts/ci-install-packages.sh
    - rm -rf .git/hooks/
  script:
    - git config --global user.email ci@sinch.com
    - git config --global user.name Bot
    - git fetch origin refs/heads/docs
    - git checkout origin/docs -- public
    - VERSION=$(npm view @nectary/components version)
    - ./scripts/generate-docs.sh $VERSION
    - git branch -D docs || true
    - git checkout --orphan docs
    - git reset
    - git add -f public
    - git commit -m "build docs"
    - git push --force "https://gitlab-ci-token:$PROJECT_ACCESS_TOKEN@$CI_SERVER_HOST/$CI_PROJECT_PATH.git"
  artifacts:
    paths:
      - public

publish-docs:
  stage: docs
  image:
    name: public.ecr.aws/aws-cli/aws-cli:latest
    entrypoint: [""]
  extends:
    - .aws-authenticate-classic-engage-nectary
  needs:
    - build-docs
  rules:
    - if: $CI_COMMIT_TAG =~ /^@nectary/
    - if: $CI_COMMIT_TAG == "docs"
      when: always
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
      changes:
        paths:
          - docs/**/*
      when: on_success
  variables:
    GIT_LFS_SKIP_SMUDGE: 1
  script:
    - aws s3 rm s3://${BUCKET_ID}/.public/ --recursive --exclude ""
    - aws s3 cp public/ s3://${BUCKET_ID}/.public/ --recursive --include "*"
    - aws cloudfront create-invalidation --distribution-id ${DISTRIBUTION_ID} --paths "/*"

build-icon-fonts:
  stage: build
  extends:
    - .cache
    - .prepare-ci
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event" && $CI_COMMIT_BRANCH != $CI_DEFAULT_BRANCH
      changes:
        - svg-icons/**/*
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
      changes:
        - svg-icons/**/*
    - when: never
  artifacts:
    paths:
      - fonts
      - components/icon/generated-icon-type.ts
      - docs/latest/src/pages/components/Icon/examples/icons-list.ts
    expire_in: 1 week
  variables:
    GIT_LFS_SKIP_SMUDGE: 1
  script:
    - pnpm run icons:fonts:clean
    - pnpm run icons:fonts:process
    - pnpm lint:fix

commit-fonts:
  stage: deploy
  needs:
    - build-icon-fonts
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event" && $CI_COMMIT_BRANCH != $CI_DEFAULT_BRANCH
      changes:
        - svg-icons/**/*
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
      changes:
        - svg-icons/**/*
    - when: never
  script:
    - apt-get update -y
    - apt-get install -y git git-lfs
    - git lfs update --force
    - git lfs install
    - git config --global user.email ci@sinch.com
    - git config --global user.name Bot
    - git fetch origin
    - echo $CI_COMMIT_REF_NAME
    - git checkout $CI_COMMIT_REF_NAME
    - git add -A
    - 'git commit -m "feat(components): update icon fonts"'
    - git push  -o ci.skip "https://gitlab-ci-token:$FONT_PUSH_TOKEN@$CI_SERVER_HOST/$CI_PROJECT_PATH.git"

publish-icon-fonts:
  stage: deploy
  image:
    name: public.ecr.aws/aws-cli/aws-cli:latest
    entrypoint: [""]
  extends:
    - .aws-authenticate-classic-engage-nectary
  needs:
    - build-icon-fonts
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event" && $CI_COMMIT_BRANCH != $CI_DEFAULT_BRANCH
      changes:
        - svg-icons/**/*
      when: manual
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
      changes:
        - svg-icons/**/*
      when: on_success
    - when: never
  ## TODO: add a visual test for the icons
  manual_confirmation: 'Are you sure you want to update the icons files?'
  variables:
    GIT_LFS_SKIP_SMUDGE: 1
  script:
    - BUCKET_ID='saas-fonts'
    - DISTRIBUTION_ID='E2702PBO3GP1PT'
    - env
    - aws s3 cp fonts/ s3://${BUCKET_ID}/ --recursive --include "*" --acl public-read
    - aws cloudfront create-invalidation --distribution-id ${DISTRIBUTION_ID} --paths "/*"

