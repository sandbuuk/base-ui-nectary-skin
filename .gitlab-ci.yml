variables:
  GIT_DEPTH: 1

include:
  - project: 'sinch/sinch-projects/sinch-platform/infra/pipeline/security'
    ref: v1-latest
    file: 'auto_security.yml'

default:
  tags:
    - saas
    - application

stages:
  - lint
  - test
  - build
  - security-scan-third-parties
  - security-scan-consolidation
  - security-scan-sonar
  - deploy

lint:
  image: node:16
  stage: lint
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
  cache:
    key:
      files:
        - pnpm-lock.yaml
      prefix: cache
    paths:
      - .pnpm-store
  variables:
    GIT_LFS_SKIP_SMUDGE: 1
  before_script:
    - npm install --no-audit --no-fund --global pnpm
    - pnpm config set store-dir .pnpm-store
    - pnpm install --frozen-lockfile
  script:
    - pnpm lint

visual-tests:
  stage: test
  image: mcr.microsoft.com/playwright:v1.33.0
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
  cache:
    key:
      files:
        - pnpm-lock.yaml
      prefix: cache
    paths:
      - .pnpm-store
    policy: pull
  parallel:
    matrix:
      - BROWSER_FRAMEWORK:
          - chromium-react
          - firefox-vue
          - webkit-angular
  before_script:
    - npm install --no-audit --no-fund --global pnpm
    - pnpm config set store-dir .pnpm-store
    - pnpm install --frozen-lockfile --offline --reporter silent
  script:
    - pnpm --dir tests test:ci-$BROWSER_FRAMEWORK
  artifacts:
    when: on_failure
    paths:
      - tests/test-results

publish-components:
  stage: deploy
  needs:
    - publish-docs
  rules:
    - if: $CI_COMMIT_TAG =~ /^components@/
  image: node:16
  cache:
    key:
      files:
        - pnpm-lock.yaml
      prefix: cache
    paths:
      - .pnpm-store
    policy: pull
  variables:
    GIT_LFS_SKIP_SMUDGE: 1
  before_script:
    - npm install --no-audit --no-fund --global pnpm
    - pnpm config set store-dir .pnpm-store
    - pnpm install --frozen-lockfile --offline --reporter silent
  script:
    - pnpm --dir components build
    - echo "//registry.npmjs.org/:_authToken=${NPM_TOKEN}" > .npmrc
    - npm publish components/
    - node ./scripts/slack-changelog.js components

