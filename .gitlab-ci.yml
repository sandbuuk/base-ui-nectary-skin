default:
  tags:
    - staging

stages:
  - lint
  - test
  - build
  - deploy

lint:
  image: node:16
  stage: lint
  except:
    - tags
  cache:
    key:
      files:
        - yarn.lock
      prefix: cache
    paths:
      - .yarn/
  variables:
    GIT_LFS_SKIP_SMUDGE: 1
  before_script:
    - yarn install --cache-folder $PWD/.yarn --frozen-lockfile
  script:
    - yarn lint

visual-tests:
  stage: test
  image: mcr.microsoft.com/playwright:v1.22.2
  except:
    - tags
  cache:
    key:
      files:
        - yarn.lock
      prefix: cache
    paths:
      - .yarn/
    policy: pull
  before_script:
    - yarn install --cache-folder $PWD/.yarn --frozen-lockfile
  script:
    - yarn --cwd=tests test:ci
  after_script:
    - find ./tests/test-results -type d -empty -delete
  artifacts:
    when: on_failure
    paths:
      - tests/test-results

publish-components:
  stage: deploy
  rules:
    - if: $CI_COMMIT_TAG =~ /^components@/
  image: node:16
  cache:
    key:
      files:
        - yarn.lock
      prefix: cache
    paths:
      - .yarn/
    policy: pull
  variables:
    GIT_LFS_SKIP_SMUDGE: 1
  before_script:
    - yarn install --cache-folder $PWD/.yarn --frozen-lockfile
  script:
    - yarn --cwd=components build
    - echo "//registry.npmjs.org/:_authToken=${NPM_TOKEN}" > .npmrc
    - npm publish components/
    - node ./scripts/slack-changelog.js

pages:
  stage: deploy
  image: node:16
  rules:
    - if: $CI_COMMIT_TAG =~ /^components@/
    - if: $CI_COMMIT_TAG =~ /^storybook$/
  cache:
    key:
      files:
        - yarn.lock
      prefix: cache
    paths:
      - .yarn/
    policy: pull
  variables:
    GIT_LFS_SKIP_SMUDGE: 1
  before_script:
    - yarn install --cache-folder $PWD/.yarn --frozen-lockfile
    - rm -rf .git/hooks/
  script:
    - yarn storybook:build
    - git config --global user.email ci@sinch.com
    - git config --global user.name Bot
    - git checkout --orphan storybook
    - git reset
    - git add -f public
    - git commit -m "build storybook"
    - git push --force "https://gitlab-ci-token:$PROJECT_ACCESS_TOKEN@$CI_SERVER_HOST/$CI_PROJECT_PATH.git"
  artifacts:
    paths:
      - public
