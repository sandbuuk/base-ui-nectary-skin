variables:
  GIT_DEPTH: 1

include:
  - project: "sinch/sinch-projects/sinch-platform/infra/pipeline/security"
    ref: v1-latest
    file: "auto_security.yml"

default:
  image: node:20
  before_script:
    - echo -e "\e[0Ksection_start:`date +%s`:job_env_output[collapsed=true]\r\e[0KJob Environment output"
    - pwd
    - env
    - echo -e "\e[0Ksection_end:`date +%s`:job_env_output\r\e[0K"
    - ./scripts/ci-install-packages.sh
  tags:
    - saas
    - application

stages:
  - lint
  - test
  - build
  - security-scan-third-parties
  - security-scan-consolidation
  - security-scan-sonar
  - deploy

.cache:
  cache:
    key:
      files:
        - pnpm-lock.yaml
      prefix: cache
    paths:
      - .pnpm-store

lint:
  extends: .cache
  image: node:20
  stage: lint
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
  variables:
    GIT_LFS_SKIP_SMUDGE: 1
  script:
    - pnpm lint

visual-tests:
  stage: test
  image: mcr.microsoft.com/playwright:v1.33.0
  extends: .cache
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
  parallel:
    matrix:
      - BROWSER_FRAMEWORK:
          - chromium-react
          - firefox-vue
          - webkit-angular
  script:
    - pnpm --dir tests test:ci-$BROWSER_FRAMEWORK
  artifacts:
    when: on_failure
    paths:
      - tests/test-results

publish:
  extends: .cache
  stage: publish
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
  script:
    # a bit different configuration for publishing packages.
    - ./script/publish-package.sh ${NPM_TOKEN}

build-docs:
  stage: build
  extends: .cache
  rules:
    - if: $CI_COMMIT_TAG =~ /^components@/
    - if: $CI_COMMIT_TAG == "docs"
  cache:
    key:
      files:
        - pnpm-lock.yaml
      prefix: cache
    paths:
      - .pnpm-store
  variables:
    GIT_LFS_SKIP_SMUDGE: 1
  before_script:
    - ./scripts/ci-install-packages.sh
    - rm -rf .git/hooks/
  script:
    - git config --global user.email ci@sinch.com
    - git config --global user.name Bot
    - git fetch origin refs/heads/docs
    - git checkout origin/docs -- public
    - ./scripts/generate-docs.sh
    - git branch -D docs || true
    - git checkout --orphan docs
    - git reset
    - git add -f public
    - git commit -m "build docs"
    - git push --force "https://gitlab-ci-token:$PROJECT_ACCESS_TOKEN@$CI_SERVER_HOST/$CI_PROJECT_PATH.git"
  artifacts:
    paths:
      - public

publish-docs:
  stage: deploy
  image: 652860480992.dkr.ecr.eu-west-1.amazonaws.com/aws-cli-runner
  needs:
    - build-docs
  rules:
    - if: $CI_COMMIT_TAG =~ /^components@/
    - if: $CI_COMMIT_TAG == "docs"
  variables:
    GIT_LFS_SKIP_SMUDGE: 1
  script:
    - appcli use production
    - aws s3 rm s3://${BUCKET_ID}/.public/ --recursive --exclude ""
    - aws s3 cp public/ s3://${BUCKET_ID}/.public/ --recursive --include "*"
    - aws cloudfront create-invalidation --distribution-id ${DISTRIBUTION_ID} --paths "/*"

pages:
  stage: deploy
  rules:
    - if: $CI_COMMIT_TAG == "preview"
  cache:
    key:
      files:
        - pnpm-lock.yaml
      prefix: cache
    paths:
      - .pnpm-store
  variables:
    GIT_LFS_SKIP_SMUDGE: 1
  before_script:
    - ./scripts/ci-install-packages.sh
  script:
    - ./scripts/generate-docs.sh
  artifacts:
    paths:
      - public
