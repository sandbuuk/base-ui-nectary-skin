image: node:16

stages:
  - test
  - deploy

lint:
  stage: test
  cache:
    key:
      files:
        - yarn.lock
      prefix: $CI_JOB_NAME
    paths:
      - node_modules/
      - .yarn/
  before_script:
    - yarn config set cache-folder $PWD/.yarn
    - yarn install --frozen-lockfile
  script:
    - yarn lint

test:
  stage: test
  image: mcr.microsoft.com/playwright:focal
  cache:
    key:
      files:
        - yarn.lock
      prefix: $CI_JOB_NAME
    paths:
      - node_modules/
      - .yarn/
      - .browsers/
  before_script:
    - yarn config set cache-folder $PWD/.yarn
    - yarn install --frozen-lockfile
    - yarn test-playwright-install
  script:
    - yarn test

pages:
  stage: deploy
  only:
    - main
  cache:
    key:
      files:
        - yarn.lock
      prefix: lint
    paths:
      - node_modules/
      - .yarn/
    policy: pull
  before_script:
    - yarn config set cache-folder $PWD/.yarn
    - yarn install --frozen-lockfile
  script:
    - yarn build-storybook
    - git config --global user.email ci@sinch.com
    - git config --global user.name Bot
    - git checkout --orphan storybook
    - git reset
    - git add -f public
    - git commit -m "build storybook"
    - git push --force "https://gitlab-ci-token:$PROJECT_ACCESS_TOKEN@$CI_SERVER_HOST/$CI_PROJECT_PATH.git"
  artifacts:
    paths:
      - public
