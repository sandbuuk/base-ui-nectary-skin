<style>
:where(*, *::before, *::after) {
  box-sizing: border-box;
  padding: 0;
  border: 0;
  margin: 0;
  font: inherit;
}

:host {
  --base-size: 288px; /* 18rem */
  --aspect-ratio: 1 / 2.1;
  --scale: 1;

  inline-size: min(100%, var(--base-size));
  aspect-ratio: var(--aspect-ratio);
  overflow: hidden;
  display: block;
}

section {
  position: relative;
  inline-size: var(--base-size);
  aspect-ratio: var(--aspect-ratio);
  scale: var(--scale);
  transform-origin: top left;
  overflow: hidden;
  display: flex;
  flex-flow: column;
  padding: 12px;
  border: 1px solid var(--sinch-sys-color-border-strong);
  border-radius: 32px;
  background: var(--sinch-sys-color-surface-primary-default);
}

section > header {
  position: sticky;
  inset-block-start: 0;
  display: flex;
  justify-content: space-between;
  padding: 16px;
  background: var(--sinch-sys-color-surface-primary-default);
  font: var(--sinch-sys-font-body-xxs);
}

section > header > svg {
  inline-size: 48px;
}

section > div {
  flex: 1;
  overflow-y: auto;
  scrollbar-width: none;
  border-end-start-radius: 16px;
  border-end-end-radius: 16px;
}
</style>
