<style>
:where(*, *::before, *::after) {
  box-sizing: border-box;
  padding: 0;
  border: 0;
  margin: 0;
  font: inherit;
}

a {
  display: grid;
  grid-template:
    "icon contact" auto
    "icon label  " auto
    / auto 1fr;
  align-items: center;
  gap: 0 16px;
  padding: 8px 16px;
  border-block-end:
    1px solid
    var(--sinch-sys-color-surface-secondary-active);
  color: currentcolor;
  word-break: break-all;
  text-decoration: none;
}

a > sinch-icon {
  grid-area: icon;
}

a > #contact {
  grid-area: contact;
}

a > #contact::before {
  content: "\200b";
}

a > #label {
  grid-area: label;
}

a > #label::before {
  content: "\200b";
}

a[inert] {
  --sinch-global-color-icon: currentcolor;

  color: var(--sinch-sys-color-text-muted);
}
</style>

<a target="_blank">
  <sinch-icon icons-version="2"></sinch-icon>
  <span id="contact"></span>
  <p id="label"></p>
</a>
