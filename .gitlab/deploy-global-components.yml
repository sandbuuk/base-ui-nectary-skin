variables:
  BUCKET_ID: nectary-components

.deploy_base:
  stage: deploy
  image:
    name: public.ecr.aws/aws-cli/aws-cli:latest
    entrypoint: [""]
  id_tokens:
    GITLAB_OIDC_TOKEN:
      aud: https://gitlab.com
  before_script:
    - echo $GITLAB_OIDC_TOKEN > $AWS_WEB_IDENTITY_TOKEN_FILE
  variables:
    GIT_LFS_SKIP_SMUDGE: 1
    ACCOUNT: 953094423485
    AWS_ROLE_ARN: arn:aws:iam::$ACCOUNT:role/ci-deployment-role
    AWS_WEB_IDENTITY_TOKEN_FILE: $RUNNER_TEMP_PROJECT_DIR/aws-web-identity-token-file
    AWS_ROLE_SESSION_NAME: "GitLabRunner-${CI_PROJECT_ID}-${CI_PIPELINE_ID}"
    AWS_DEFAULT_REGION: ap-southeast-2

.deploy_dry_run:
  extends: .deploy_base
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
    - when: never
  needs:
    - job: publish-dry-run
      artifacts: true

.deploy:
  extends: .deploy_base
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
    - when: never
  needs:
    - job: publish
      artifacts: true

deploy-global-components-dry-run:
  extends: .deploy_dry_run
  script:
    - |
      COMPONENTS_VERSION=$(grep "@nectary/components" published.txt | awk '{print $2}' || true)
      if [ -z "$COMPONENTS_VERSION" ]; then
        echo "No new published version of @nectary/components, skipping."
        exit 0
      fi

      echo "Components version: $COMPONENTS_VERSION"

      # Upload versioned files
      aws s3 sync components/ s3://nectary-components/components/$COMPONENTS_VERSION \
        --exclude "**/node_modules/*" \
        --exclude "**/*.ts" \
        --include "**/*.d.ts" \
        --no-progress \
        --delete \
        --dry-run || exit_code=$?

      if [ $exit_code -ne 0 ]; then
        echo "Sync completed with warnings (exit code $exit_code)"
        exit 0
      fi

deploy-global-components:
  extends: .deploy
  script:
    - |
      COMPONENTS_VERSION=$(grep "@nectary/components" published.txt | awk '{print $2}' || true)
      if [ -z "$COMPONENTS_VERSION" ]; then
        echo "No new published version of @nectary/components, skipping."
        exit 0
      fi

      # Upload versioned files
      aws s3 sync components/ s3://nectary-components/components/$COMPONENTS_VERSION \
        --exclude "**/node_modules/*" \
        --exclude "**/*.ts" \
        --include "**/*.d.ts" \
        --no-progress \
        --delete || exit_code=$?

      if [ $exit_code -ne 0 ]; then
        echo "Sync completed with warnings (exit code $exit_code)"
        exit 0
      fi

      # Update 'latest' pointer
      echo "Updating 'latest' pointer to $COMPONENTS_VERSION"
      aws s3 sync components/ s3://nectary-components/components/latest \
        --exclude "**/node_modules/*" \
        --exclude "**/*.ts" \
        --include "**/*.d.ts" \
        --no-progress \
        --delete || exit_code=$?

      if [ $exit_code -ne 0 ]; then
        echo "Latest sync completed with warnings (exit code $exit_code)"
      fi

      echo "Components $COMPONENTS_VERSION deployed!"

