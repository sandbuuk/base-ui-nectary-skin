      fi

deploy-global-assets:
  extends: .deploy
  script:
    - |
      ASSETS_VERSION=$(grep "@nectary/assets" published.txt | awk '{print $2}' || true)
      if [ -z "$ASSETS_VERSION" ]; then
        echo "No new published version of @nectary/assets, skipping."
